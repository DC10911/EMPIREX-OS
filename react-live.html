    <script type="module">
      import * as THREE from 'three';
      import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
      import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
      import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
      import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

      const canvas=document.getElementById('bg3d');
      const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));
      renderer.setSize(innerWidth,innerHeight);
      renderer.setClearColor(0x02030a,0);

      const scene=new THREE.Scene();
      scene.fog=new THREE.FogExp2(0x02030a,0.035);
      const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200);
      camera.position.set(0,0,9);

      scene.add(new THREE.AmbientLight(0x334466,.6));
      const key=new THREE.PointLight(0x12d7d1,3,40);key.position.set(6,4,5);scene.add(key);
      const fill=new THREE.PointLight(0x2739b7,2,40);fill.position.set(-6,-3,4);scene.add(fill);
      const rim=new THREE.PointLight(0x12d7d1,1.5,40);rim.position.set(0,6,-6);scene.add(rim);

      // Core orb
      const coreGroup=new THREE.Group();scene.add(coreGroup);
      const core=new THREE.Mesh(
        new THREE.IcosahedronGeometry(1.6,3),
        new THREE.MeshPhysicalMaterial({color:0x121b82,metalness:.8,roughness:.15,clearcoat:1,iridescence:1,iridescenceIOR:1.45,transmission:.4,thickness:1.4,emissive:0x07124a,emissiveIntensity:.7})
      );coreGroup.add(core);
      const wire=new THREE.Mesh(
        new THREE.IcosahedronGeometry(1.95,3),
        new THREE.MeshBasicMaterial({color:0x12d7d1,wireframe:true,transparent:true,opacity:.32})
      );coreGroup.add(wire);
      const shell=new THREE.Mesh(
        new THREE.IcosahedronGeometry(2.5,2),
        new THREE.MeshBasicMaterial({color:0x2739b7,wireframe:true,transparent:true,opacity:.18})
      );coreGroup.add(shell);

      // glow sprite
      const glowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=256;const g=c.getContext('2d');const grd=g.createRadialGradient(128,128,0,128,128,128);grd.addColorStop(0,'rgba(18,215,209,1)');grd.addColorStop(.3,'rgba(39,57,183,.5)');grd.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=grd;g.fillRect(0,0,256,256);return new THREE.CanvasTexture(c)})();
      const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:0x12d7d1,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
      glow.scale.set(10,10,1);coreGroup.add(glow);

      // rings
      function makeRing(r,col,t){const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,16,200),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.85,blending:THREE.AdditiveBlending}));return m}
      const r1=makeRing(3.0,0x12d7d1,.012);r1.rotation.x=Math.PI/2.2;coreGroup.add(r1);
      const r2=makeRing(3.7,0x2739b7,.009);r2.rotation.x=Math.PI/3;r2.rotation.y=Math.PI/4;coreGroup.add(r2);
      const r3=makeRing(4.4,0x12d7d1,.006);r3.rotation.x=Math.PI/1.6;coreGroup.add(r3);

      // starfield
      const N=4500;const positions=new Float32Array(N*3);const colors=new Float32Array(N*3);
      const cA=new THREE.Color(0x12d7d1),cB=new THREE.Color(0x2739b7),cC=new THREE.Color(0xffffff);
      for(let i=0;i<N;i++){const r=10+Math.random()*30;const t=Math.random()*Math.PI*2;const p=Math.acos(2*Math.random()-1);positions[i*3]=r*Math.sin(p)*Math.cos(t);positions[i*3+1]=r*Math.sin(p)*Math.sin(t);positions[i*3+2]=r*Math.cos(p);const pk=Math.random();const c=pk<.55?cA:pk<.9?cB:cC;colors[i*3]=c.r;colors[i*3+1]=c.g;colors[i*3+2]=c.b}
      const pg=new THREE.BufferGeometry();pg.setAttribute('position',new THREE.BufferAttribute(positions,3));pg.setAttribute('color',new THREE.BufferAttribute(colors,3));
      const stars=new THREE.Points(pg,new THREE.PointsMaterial({size:.06,vertexColors:true,transparent:true,opacity:.95,blending:THREE.AdditiveBlending,depthWrite:false}));
      scene.add(stars);

      // grid floor
      const grid=new THREE.GridHelper(60,60,0x12d7d1,0x07124a);grid.position.y=-4;grid.material.transparent=true;grid.material.opacity=.35;scene.add(grid);

      // post
      const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
      const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.3,0.9,0.15);composer.addPass(bloom);
      const chroma=new ShaderPass({uniforms:{tDiffuse:{value:null},amount:{value:0.0022},time:{value:0}},vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`uniform sampler2D tDiffuse;uniform float amount;uniform float time;varying vec2 vUv;void main(){vec2 o=amount*vec2(cos(time*.3),sin(time*.27));float r=texture2D(tDiffuse,vUv+o).r;float g=texture2D(tDiffuse,vUv).g;float b=texture2D(tDiffuse,vUv-o).b;vec3 col=vec3(r,g,b);vec2 v=vUv-.5;col*=1.0-dot(v,v)*.85;float n=fract(sin(dot(vUv*512.+time,vec2(12.9898,78.233)))*43758.5453);col+=(n-.5)*.022;gl_FragColor=vec4(col,1.);} `});composer.addPass(chroma);

      let pointer={x:0,y:0},scrollY=0;
      addEventListener('pointermove',e=>{pointer.x=(e.clientX/innerWidth)*2-1;pointer.y=(e.clientY/innerHeight)*2-1});
      addEventListener('scroll',()=>{scrollY=window.scrollY/Math.max(1,document.body.scrollHeight-innerHeight)},{passive:true});
      addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()});

      const clock=new THREE.Clock();
      function loop(){const t=clock.getElapsedTime();
        core.rotation.x=t*.15;core.rotation.y=t*.25;wire.rotation.x=-t*.18;wire.rotation.y=t*.22;shell.rotation.z=t*.05;
        coreGroup.scale.setScalar(1+Math.sin(t*1.6)*.04);
        r1.rotation.z=t*.4;r2.rotation.z=-t*.3;r3.rotation.x=Math.PI/1.6+Math.sin(t*.3)*.2;
        stars.rotation.y=t*.018;stars.rotation.x=t*.01;
        key.intensity=3+Math.sin(t*1.3)*.7;
        const orbit=t*.07;
        const tx=pointer.x*.9+Math.sin(orbit)*.7;
        const ty=-pointer.y*.55+Math.cos(orbit*.7)*.4+scrollY*-1.5;
        camera.position.x+=(tx-camera.position.x)*.05;
        camera.position.y+=(ty-camera.position.y)*.05;
        camera.position.z=9-scrollY*3;
        camera.lookAt(0,scrollY*-1,0);
        chroma.uniforms.time.value=t;composer.render();requestAnimationFrame(loop);
      }loop();
    </script>

                                            <div className="grid h-16 w-16 place-items-center rounded-2xl bg-[#07124A] text-xl font-black text-white">{num}</div>
                                            <div>
                                                <h3 className="text-2xl font-black tracking-[-0.04em]">{title}</h3>
                                                <p className="mt-2 leading-7 text-slate-600">{text}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section className="mx-auto max-w-7xl px-5 pb-24 lg:px-8">
                            <div className="overflow-hidden rounded-[3rem] bg-[#07124A] shadow-[0_40px_120px_rgba(7,18,74,.24)]">
                                <div className="grid gap-0 lg:grid-cols-[.95fr_1.05fr]">
                                    <div className="p-8 text-white md:p-12">
                                        <p className="text-sm font-black uppercase tracking-[0.32em] text-cyan-300">EMPIREX OS</p>
                                        <h2 className="mt-4 text-4xl font-black leading-tight tracking-[-0.055em] md:text-6xl">המסחר שלך צריך מערכת. לא עוד כלי.</h2>
                                        <p className="mt-6 text-lg leading-9 text-white/70">
                                            כשכל החלטה, סיכון, עסקה, בוט, יומן ותיק השקעות נמצאים באותה שכבת שליטה — הסוחר מפסיק לנחש ומתחיל לנהל מערכת.
                                        </p>
                                        <div className="mt-9 flex flex-col gap-4 sm:flex-row">
                                            <button onClick={goToHomeQuick} className="rounded-2xl bg-[#16D3D1] px-7 py-4 font-black text-white shadow-[0_20px_50px_rgba(22,211,209,.25)] transition hover:-translate-y-1">כניסה מהירה לדף הבית</button>
                                            <button onClick={scrollToRegister} className="rounded-2xl border border-white/15 bg-white/10 px-7 py-4 font-black text-white transition hover:-translate-y-1">ראה דמו של המערכת</button>
                                        </div>
                                    </div>
                                    <div className="relative min-h-[420px] bg-[radial-gradient(circle_at_50%_50%,rgba(25,183,242,.2),transparent_35%),linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02))] p-8 md:p-12">
                                        <div className="rounded-[2rem] border border-white/10 bg-white/10 p-5 backdrop-blur-xl">
                                            <div className="mb-5 flex items-center justify-between text-white">
                                                <span className="font-black">System Readiness</span>
                                                <span className="rounded-full bg-emerald-400/15 px-3 py-1 text-xs font-black text-emerald-200">Enterprise Grade</span>
                                            </div>
                                            {[
                                                ["Unified trading workflow", "94%"],
                                                ["Real-time market layer", "91%"],
                                                ["AI memory per user", "88%"],
                                                ["Risk guardrails", "96%"],
                                                ["Journal analytics", "90%"],
                                                ["Portfolio tracking", "89%"],
                                            ].map(([label, value]) => (
                                                <div key={label} className="mb-3 flex items-center justify-between rounded-2xl bg-white/10 px-4 py-3 text-sm font-bold text-white/75">
                                                    <span>{label}</span>
                                                    <span className="text-cyan-200">{value}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="register" className="mx-auto max-w-5xl px-5 pb-24 lg:px-8">
                            <div className="rounded-[2.2rem] border border-white/80 bg-white/85 p-7 shadow-[0_20px_70px_rgba(7,18,74,.12)] backdrop-blur md:p-10">
                                <div className="mb-6 text-center">
                                    <p className="text-sm font-black uppercase tracking-[0.3em] text-[#16BFCB]">Official Registration</p>
                                    <h2 className="mt-3 text-3xl font-black tracking-[-0.04em] text-[#07124A] md:text-5xl">הרשמה אמיתית למערכת</h2>
                                    <p className="mt-3 text-slate-600">הפרטים נשמרים במסד נתונים אמיתי דרך API פעיל.</p>
                                </div>

                                <form onSubmit={handleRegister} className="grid gap-4 md:grid-cols-2">
                                    <label className="grid gap-2 text-sm font-black text-slate-600">
                                        שם מלא
                                        <input
                                            className="rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-[#07124A] outline-none focus:border-cyan-300"
                                            name="fullName"
                                            value={formData.fullName}
                                            onChange={handleFieldChange}
                                            placeholder="השם שלך"
                                            required
                                        />
                                    </label>

                                    <label className="grid gap-2 text-sm font-black text-slate-600">
                                        אימייל
                                        <input
                                            className="rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-[#07124A] outline-none focus:border-cyan-300"
                                            type="email"
                                            name="email"
                                            value={formData.email}
                                            onChange={handleFieldChange}
                                            placeholder="name@email.com"
                                            required={formData.verificationChannel === "email"}
                                        />
                                    </label>

                                    <label className="grid gap-2 text-sm font-black text-slate-600">
                                        טלפון (לאימות SMS)
                                        <input
                                            className="rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-[#07124A] outline-none focus:border-cyan-300"
                                            type="tel"
                                            name="phone"
                                            value={formData.phone}
                                            onChange={handleFieldChange}
                                            placeholder="+9725XXXXXXXX"
                                            required={formData.verificationChannel === "phone"}
                                        />
                                    </label>

                                    <label className="grid gap-2 text-sm font-black text-slate-600">
                                        ערוץ אימות
                                        <select
                                            className="rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-[#07124A] outline-none focus:border-cyan-300"
                                            name="verificationChannel"
                                            value={formData.verificationChannel}
                                            onChange={handleFieldChange}
                                            required
                                        >
                                            <option value="email">אימות במייל</option>
                                            <option value="phone">אימות ב-SMS</option>
                                        </select>
                                    </label>

                                    <label className="grid gap-2 text-sm font-black text-slate-600">
                                        פרופיל פעילות
                                        <select
                                            className="rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-[#07124A] outline-none focus:border-cyan-300"
                                            name="profile"
                                            value={formData.profile}
                                            onChange={handleFieldChange}
                                            required
                                        >
                                            <option value="">בחר פרופיל</option>
                                            <option>Day Trader</option>
                                            <option>Swing Trader</option>
                                            <option>Funded Trader</option>
                                            <option>Portfolio Builder</option>
                                        </select>
                                    </label>

                                    <label className="grid gap-2 text-sm font-black text-slate-600 md:row-span-2">
                                        הערות (אופציונלי)
                                        <textarea
                                            className="h-full min-h-[120px] rounded-xl border border-slate-200 bg-white px-4 py-3 font-semibold text-[#07124A] outline-none focus:border-cyan-300"
                                            name="notes"
                                            value={formData.notes}
                                            onChange={handleFieldChange}
                                            placeholder="מה חשוב לך במערכת?"
                                        />
                                    </label>

                                    <div className="md:col-span-2 flex flex-col gap-3">
                                        <button
                                            type="submit"
                                            disabled={isSubmitting}
                                            className="rounded-2xl bg-[#07124A] px-7 py-4 text-base font-black text-white shadow-[0_24px_60px_rgba(7,18,74,.28)] transition hover:-translate-y-1 disabled:cursor-not-allowed disabled:opacity-60"
                                        >
                                            {isSubmitting ? "שומר הרשמה..." : "שלח הרשמה"}
                                        </button>

                                        {submitMessage.text ? (
                                            <p className={`text-sm font-bold ${submitMessage.type === "success" ? "text-emerald-600" : "text-rose-600"}`}>
                                                {submitMessage.text}
                                            </p>
                                        ) : null}
                                    </div>
                                </form>

                                {verificationContext ? (
                                    <form onSubmit={handleVerifyCode} className="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 md:p-6">
                                        <h3 className="text-xl font-black text-[#07124A]">אימות קוד הרשמה</h3>
                                        <p className="mt-1 text-sm font-semibold text-slate-500">
                                            הזן את הקוד שנשלח אל {verificationContext.channel === "phone" ? verificationContext.phone : verificationContext.email}
                                        </p>
                                        {verificationContext.devCode ? (
                                            <p className="mt-2 text-xs font-black text-cyan-700">DEV CODE: {verificationContext.devCode}</p>
                                        ) : null}

                                        <div className="mt-4 flex flex-col gap-3 md:flex-row">
                                            <input
                                                className="flex-1 rounded-xl border border-slate-200 bg-white px-4 py-3 font-black tracking-[0.3em] text-[#07124A] outline-none focus:border-cyan-300"
                                                placeholder="______"
                                                maxLength={6}
                                                value={verificationCode}
                                                onChange={(event) => setVerificationCode(event.target.value.replace(/\D/g, ""))}
                                            />
                                            <button
                                                type="submit"
                                                disabled={isVerifying}
                                                className="rounded-2xl bg-[#07124A] px-6 py-3 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-60"
                                            >
                                                {isVerifying ? "מאמת..." : "אמת קוד"}
                                            </button>
                                            <button
                                                type="button"
                                                onClick={handleResendCode}
                                                disabled={isResending}
                                                className="rounded-2xl border border-slate-200 bg-white px-6 py-3 text-sm font-black text-[#07124A] disabled:cursor-not-allowed disabled:opacity-60"
                                            >
                                                {isResending ? "שולח..." : "שלח קוד מחדש"}
                                            </button>
                                        </div>
                                    </form>
                                ) : null}
                            </div>
                        </section>
                    </main>

                    <footer className="border-t border-white/70 bg-white/70 py-10 backdrop-blur-xl">
                        <div className="mx-auto flex max-w-7xl flex-col gap-6 px-5 lg:flex-row lg:items-center lg:justify-between lg:px-8">
                            <div className="flex items-center gap-4">
                                <EmpirexMark className="h-12 w-12" />
                                <div>
                                    <div className="text-xl font-black tracking-[0.22em] text-[#07124A]">EMPIREX <span className="text-[#16D3D1]">OS</span></div>
                                    <div className="text-[10px] font-black uppercase tracking-[0.28em] text-slate-400">Unified Trading Operating System</div>
                                </div>
                            </div>
                            <p className="text-sm font-semibold text-slate-500">© {year} EMPIREX OS. Built for serious traders, intelligent execution and capital control.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<EmpirexOSLandingPage />);
    </script>
</body>

</html>
