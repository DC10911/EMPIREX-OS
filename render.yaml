services:
  - type: web
    name: empirexos-landing
    runtime: python
    plan: starter
    autoDeploy: true
    rootDir: .
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python empirex_server.py"
    healthCheckPath: /api/health
    disks:
      - name: empirex-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: EMPIREX_DB_PATH
        value: /var/data/empirex_leads.db
      - key: OTP_SECRET
        sync: false
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: OTP_RESEND_COOLDOWN_SECONDS
        value: "60"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "1"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: APP_BASE_URL
        sync: false
