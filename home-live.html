        function formatPrice(value, digits = 2) {
            if (typeof value !== "number" || Number.isNaN(value)) return "—";
            return value.toLocaleString("en-US", {

            });
        }

        function normalizeHistoryPoints(points) {
            const safePoints = (Array.isArray(points) ? points : []).filter((v) => typeof v === "number" && !Number.isNaN(v));
            if (!safePoints.length) return [0, 0, 0, 0, 0, 0];
            if (safePoints.length === 1) {
                const val = safePoints[0];
                return [val, val, val, val, val, val];
            }
            return safePoints;
        }

        function buildLinePath(points, width = 128, height = 42, padding = 4) {
            const values = normalizeHistoryPoints(points);
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min || 1;
            const innerWidth = width - padding * 2;
            const innerHeight = height - padding * 2;
            const step = values.length > 1 ? innerWidth / (values.length - 1) : innerWidth;

            const coords = values.map((value, index) => {
                const x = padding + step * index;
                const y = padding + innerHeight - ((value - min) / range) * innerHeight;
                return [x, y];
            });

            return coords.map((point, index) => `${index === 0 ? "M" : "L"}${point[0].toFixed(2)} ${point[1].toFixed(2)}`).join(" ");
        }

        function getDigits(symbol, type) {
            if (type === "fx") {
                if (symbol.includes("JPY")) return 2;
                return 4;
            }
            return 2;
        }

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

        async function fetchMarketData() {
            const [fxResult, stocksResult] = await Promise.allSettled([
                fetch("/api/market/fx?limit=30").then(safeJson),
                fetch("/api/market/stocks?limit=30").then(safeJson),
            ]);

            const fxData = fxResult.status === "fulfilled"
                ? (Array.isArray(fxResult.value?.data) ? fxResult.value.data : Array.isArray(fxResult.value) ? fxResult.value : fallbackFx)
                : fallbackFx;

            const stockData = stocksResult.status === "fulfilled"
                ? (Array.isArray(stocksResult.value?.data) ? stocksResult.value.data : Array.isArray(stocksResult.value) ? stocksResult.value : fallbackStocks)
                : fallbackStocks;

            const allItems = [...fxData, ...stockData];
            const hasFallback = allItems.some((item) => item?.live === false || item?.source === "fallback");
            const hasAnyLive = allItems.some((item) => item?.live !== false && item?.source !== "fallback");

            return {
                fx: fxData,
                stocks: stockData,
                source: hasAnyLive && hasFallback ? "partial-fallback" : hasAnyLive ? "live-api" : "fallback",
            };
        }

        function CandleChart({ symbol, type, height = 52 }) {
            const containerRef = React.useRef(null);

            useEffect(() => {
                const el = containerRef.current;
                if (!el || typeof LightweightCharts === 'undefined') return;

                let isMounted = true;
                const w = el.getBoundingClientRect().width || 144;
                const chart = LightweightCharts.createChart(el, {
                    width: w,
                    height,
                    layout: { background: { color: '#ffffff' }, textColor: '#07124A' },
                    grid: { vertLines: { visible: false }, horzLines: { visible: false } },
                    rightPriceScale: { visible: false },
                    leftPriceScale: { visible: false },
                    timeScale: { visible: false, borderVisible: false },
                    crosshair: { mode: 2 },
                    handleScroll: false,
                    handleScale: false,
                });

                const series = chart.addCandlestickSeries({
                    upColor: '#19B77A', downColor: '#EF4444',
                    borderUpColor: '#19B77A', borderDownColor: '#EF4444',
                    wickUpColor: '#19B77A', wickDownColor: '#EF4444',
                });

                const yfinSymbol = type === 'fx' ? symbol.replace('/', '') + '=X' : symbol;
                fetch('/api/market/candles?symbol=' + encodeURIComponent(yfinSymbol) + '&interval=5m&range=1d')
                    .then(r => r.json())
                    .then(data => {
                        if (!isMounted) return;
                        if (Array.isArray(data.candles) && data.candles.length > 0) {
                            series.setData(data.candles);
                            chart.timeScale().fitContent();
                        }
                    })
                    .catch(() => {});

                return () => {
                    isMounted = false;
                    try { chart.remove(); } catch (_) {}
                };
            }, [symbol, type]);

            return <div ref={containerRef} style={{ width: 144, height }} />;
        }

                    borderUpColor: '#19B77A', borderDownColor: '#EF4444',
                    wickUpColor: '#19B77A', wickDownColor: '#EF4444',
                });

                chartRef.current = chart;

                fetch('/api/market/candles?symbol=' + encodeURIComponent(yfinSymbol) + '&interval=1d&range=1y')
                    .then(r => r.json())

                            series.setData(data.candles);
                            chartRef.current.timeScale().fitContent();

                    .catch(() => {});

                const observer = new ResizeObserver(() => {

                    const r2 = el.getBoundingClientRect();
                    chartRef.current.applyOptions({ width: r2.width, height: r2.height });
                    chartRef.current.timeScale().fitContent();
                });
                observer.observe(el);

                return () => {
                    isMounted = false;
                    observer.disconnect();
                    try { chartRef.current && chartRef.current.remove(); } catch (_) {}
                    chartRef.current = null;

        function CarouselSection({ title, subtitle, items, type, source, onOpenChart }) {
            const [page, setPage] = useState(0);
            const [slideDir, setSlideDir] = useState(null);
            const [animating, setAnimating] = useState(false);
            const pageSize = 3;
            const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
            const visible = items.slice(page * pageSize, page * pageSize + pageSize);

            function goNext() {
                if (animating) return;
                setSlideDir('left');
                setAnimating(true);
                setTimeout(() => {
                    setPage((prev) => (prev + 1) % totalPages);
                    setSlideDir('in-right');
                    setTimeout(() => { setAnimating(false); setSlideDir(null); }, 350);
                }, 280);
            }

            function goPrev() {
                if (animating) return;
                setSlideDir('right');
                setAnimating(true);
                setTimeout(() => {
                    setPage((prev) => (prev - 1 + totalPages) % totalPages);
                    setSlideDir('in-left');
                    setTimeout(() => { setAnimating(false); setSlideDir(null); }, 350);
                }, 280);
            }

            const slideClass = slideDir === 'left' ? 'translate-x-[-5%] opacity-0'
                : slideDir === 'right' ? 'translate-x-[5%] opacity-0'
                : slideDir === 'in-right' ? 'translate-x-[5%] opacity-0'
                : slideDir === 'in-left' ? 'translate-x-[-5%] opacity-0'

                        </div>

        function BrokerWizardModal({ onClose, onConnected }) {
            const [step, setStep]           = useState(1);
            const [catFilter, setCatFilter] = useState("all");
            const [search, setSearch]       = useState("");
            const [broker, setBroker]       = useState(null);
            const [platform, setPlatform]   = useState(null);
            const [creds, setCreds]         = useState({});
            const [connecting, setConnecting] = useState(false);
            const [success, setSuccess]     = useState(false);
            const [err, setErr]             = useState(null);

            const filteredBrokers = ALL_BROKERS.filter(b => {
                const matchCat = catFilter === "all" || b.category === catFilter;
                const q = search.trim().toLowerCase();
                const matchQ = !q || b.label.toLowerCase().includes(q) || b.id.includes(q);
                return matchCat && matchQ;
            });

            const availablePlatforms = broker
                ? PLATFORMS.filter(p => broker.platforms.includes(p.id))
                : PLATFORMS;

            const fields = platform ? getPlatformCredFields(platform.id, broker?.id) : [];

            async function handleConnect() {
                setErr(null);
                const required = fields.filter(f => f.type !== "checkbox");
                const missing = required.filter(f => !String(creds[f.key] || "").trim());
                if (missing.length) { setErr("יש למלא: " + missing.map(f => f.label).join(", ")); return; }
                setConnecting(true);
                try {
                    const payload = { brokerId: broker.id, platformId: platform.id };
                    fields.forEach(f => {
                        if (f.key && creds[f.key] !== undefined) payload[f.key] = creds[f.key];
                    });

                    const res = await fetch("/api/broker/connect", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });
                    const result = await res.json();
                    if (!res.ok || !result.ok) {
                        setErr(result.error || "שגיאה בחיבור לברוקר");
                        setConnecting(false);
                        return;
                    }
                    const acct = result.data || {};
                    const connection = {
                        brokerId: broker.id,
                        brokerLabel: broker.label,
                        platformId: platform.id,
                        platformLabel: platform.label,
                        connectedAt: new Date().toISOString(),
                        balance: acct.balance ?? null,
                        equity: acct.equity ?? null,
                        currency: acct.currency || "USD",
                        totalTrades: acct.totalTrades ?? null,
                        openPositions: acct.openPositions ?? 0,
                        dailyPnl: acct.dailyPnl ?? null,
                        dailyTrades: acct.dailyTrades ?? 0,
                        dailyWins: acct.dailyWins ?? 0,
                        aiSummary: acct.aiSummary || "",
                        accountName: acct.name || "",
                        leverage: acct.leverage || null,
                        simulated: result.simulated || false,
                    };
                    if (platform.id === "mt4" || platform.id === "mt5") {
                        try {
                            localStorage.setItem("empirex_broker_creds", JSON.stringify({
                                platformId: platform.id,
                                server: creds.server || "",
                                login: creds.login || "",
                                password: creds.password || "",
                            }));
                        } catch {}
                    }
                    try { localStorage.setItem("empirex_broker_connection", JSON.stringify(connection)); } catch {}
                    setConnecting(false);
                    setSuccess(true);
                    setTimeout(() => onConnected(connection), 1600);
                } catch (e) {
                    setErr("שגיאת רשת — וודא שהשרת פועל ונסה שוב.");
                    setConnecting(false);
                }
            }

            const overlay = "fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4";
            const card    = "relative w-full max-w-lg rounded-[2rem] bg-white shadow-[0_40px_100px_rgba(7,18,74,.18)] p-8 text-right";

            if (success) return (
                <div className={overlay}>
                    <div className={card + " text-center"}>
                        <div className="mx-auto mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-emerald-50 text-4xl">✅</div>
                        <h2 className="text-2xl font-black text-[#07124A]">החיבור הצליח!</h2>
                        <p className="mt-2 text-sm font-semibold text-slate-500">{broker.label} דרך {platform.label} מחובר בהצלחה.</p>
                        <p className="mt-1 text-xs text-slate-400">נתוני החשבון שלך יופיעו בדשבורד בעוד רגע.</p>
                    </div>
                </div>
            );

            return (
                <div className={overlay} onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className={card}>
                        <button onClick={onClose} className="absolute left-6 top-6 rounded-full bg-slate-100 p-2 text-slate-500 hover:bg-slate-200 transition">✕</button>

                        {/* Progress dots */}
                        <div className="mb-6 flex items-center justify-end gap-2">
                            {[1,2,3].map(n => (
                                <div key={n} className={`h-2 rounded-full transition-all ${step >= n ? "w-8 bg-[#0B4DFF]" : "w-2 bg-slate-200"}`} />
                            ))}
                        </div>

                        {/* ── Step 1: בחר ברוקר / פירמה ── */}
                        {step === 1 && (<>
                            <h2 className="text-2xl font-black text-[#07124A]">עם מי אתה סוחר?</h2>
                            <p className="mt-1 mb-4 text-sm font-semibold text-slate-500">בחר את הברוקר, הפירמה או הבורסה שדרכה אתה מסחר</p>

                            {/* Search */}
                            <div className="relative mb-3">
                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
                                <input
                                    type="text"
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    placeholder="חפש FTMO, Binance, eToro..."
                                    dir="rtl"
                                    className="w-full rounded-xl border border-slate-200 bg-slate-50 py-2.5 pr-9 pl-3 text-sm font-semibold text-[#07124A] outline-none focus:border-[#0B4DFF] focus:bg-white placeholder:text-slate-300 placeholder:font-normal"

                            {/* Category pills */}
                            <div className="mb-3 flex flex-wrap gap-2 justify-end">
                                {BROKER_CATEGORIES.map(c => (
                                    <button key={c.id} onClick={() => setCatFilter(c.id)}

                                        {c.label}

                            {/* Broker grid */}

                        {/* ── Step 2: בחר פלטפורמת מסחר ── */}
                        {step === 2 && (<>

                                הפלטפורמה היא התוכנה שדרכה אתה מבצע עסקאות — לא הברוקר עצמו

                                        היכנס ל-<strong>Client Area</strong> של {broker.label} ← בחר את החשבון ← <strong>Credentials</strong>.<br/>

                            <div className="space-y-3">

                            <button onClick={handleConnect} disabled={connecting}

        // ── Trading Day Panel ────────────────────────────────────────────────────
        function TradingDayPanel({ connectedBroker, isRefreshing, onRefresh }) {
            if (!connectedBroker) return null;
            const {
                dailyPnl, dailyTrades = 0, dailyWins = 0, aiSummary,
                currency = "USD", openPositions = 0, balance, totalTrades, simulated,
            } = connectedBroker;
            const dailyWinRate = dailyTrades > 0 ? Math.round((dailyWins / dailyTrades) * 100) : null;
            const pnlPct = (balance && balance > 0 && dailyPnl != null)
                ? ((dailyPnl / balance) * 100) : null;
            const fmt = (val) => val != null
                ? new Intl.NumberFormat("en-US", { style:"currency", currency, minimumFractionDigits:2, maximumFractionDigits:2 }).format(val)
                : "—";
            const isPos = dailyPnl != null && dailyPnl > 0;
            const isNeg = dailyPnl != null && dailyPnl < 0;
            const today = new Intl.DateTimeFormat("he-IL", { weekday:"long", day:"numeric", month:"long" }).format(new Date());

            return (
                <section className="mx-auto max-w-[1320px] rounded-[1.6rem] border border-white/80 bg-white/80 p-5 shadow-[0_16px_55px_rgba(7,18,74,.07)] backdrop-blur-xl" dir="rtl">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-3">
                            <div className={`grid h-11 w-11 place-items-center rounded-2xl text-white text-xl transition-all duration-500 ${isPos ? "bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-[0_8px_24px_rgba(16,185,129,.35)]" : isNeg ? "bg-gradient-to-br from-red-400 to-red-600 shadow-[0_8px_24px_rgba(239,68,68,.35)]" : "bg-gradient-to-br from-[#0B4DFF] to-[#13C9C7] shadow-[0_8px_24px_rgba(11,77,255,.22)]"}`}>📊</div>
                            <div>
                                <h3 className="text-lg font-black text-[#07124A]">יום מסחר</h3>
                                <p className="text-xs font-semibold text-slate-400">{today} · {connectedBroker.brokerLabel} · {connectedBroker.platformLabel}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            {simulated && (
                                <span className="rounded-full bg-amber-50 border border-amber-200 px-2.5 py-1 text-[11px] font-black text-amber-600">ממשק מדומה</span>
                            )}
                            <button onClick={onRefresh} disabled={isRefreshing}
                                className="flex items-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs font-black text-slate-500 shadow-sm hover:bg-slate-50 transition disabled:opacity-50">
                                {isRefreshing
                                    ? <svg className="h-3.5 w-3.5 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity=".3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>
                                    : <Icon name="refresh" className="h-3.5 w-3.5" />}
                                עדכן
                            </button>
                        </div>
                    </div>

                    {/* Stats grid */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        {/* P&L */}
                        <div className={`rounded-2xl p-4 border ${isPos ? "bg-emerald-50 border-emerald-100" : isNeg ? "bg-red-50 border-red-100" : "bg-slate-50 border-slate-100"}`}>
                            <p className="text-[11px] font-bold text-slate-400 mb-1.5">רווח / הפסד היום</p>
                            <p className={`text-2xl font-black tracking-tight ${isPos ? "text-emerald-600" : isNeg ? "text-red-500" : "text-slate-500"}`}>
                                {fmt(dailyPnl)}
                            </p>
                            {pnlPct != null && (
                                <p className={`text-xs font-bold mt-0.5 ${isPos ? "text-emerald-500" : "text-red-400"}`}>
                                    {pnlPct > 0 ? "+" : ""}{pnlPct.toFixed(2)}%
                                </p>
                            )}
                        </div>
                        {/* Trades */}
                        <div className="rounded-2xl bg-slate-50 border border-slate-100 p-4">
                            <p className="text-[11px] font-bold text-slate-400 mb-1.5">עסקאות היום</p>
                            <p className="text-2xl font-black text-[#07124A]">{dailyTrades}</p>
                            {dailyTrades > 0 && <p className="text-xs font-bold text-slate-400 mt-0.5">{dailyWins} הצלחות · {dailyTrades - dailyWins} הפסדים</p>}
                        </div>
                        {/* Win Rate */}
                        <div className="rounded-2xl bg-slate-50 border border-slate-100 p-4">
                            <p className="text-[11px] font-bold text-slate-400 mb-1.5">אחוז הצלחה</p>
                            <p className={`text-2xl font-black ${dailyWinRate == null ? "text-slate-400" : dailyWinRate >= 60 ? "text-emerald-600" : dailyWinRate >= 40 ? "text-amber-500" : "text-red-500"}`}>
                                {dailyWinRate != null ? `${dailyWinRate}%` : "—"}
                            </p>
                            {dailyWinRate != null && (
                                <div className="mt-2 h-1.5 w-full rounded-full bg-slate-200 overflow-hidden">
                                    <div className={`h-full rounded-full transition-all ${dailyWinRate >= 60 ? "bg-emerald-400" : dailyWinRate >= 40 ? "bg-amber-400" : "bg-red-400"}`} style={{width:`${dailyWinRate}%`}} />
                                </div>
                            )}
                        </div>
                        {/* Open positions + total trades */}
                        <div className="rounded-2xl bg-slate-50 border border-slate-100 p-4">
                            <p className="text-[11px] font-bold text-slate-400 mb-1.5">פוזיציות פתוחות</p>
                            <p className="text-2xl font-black text-[#07124A]">{openPositions}</p>
                            {totalTrades != null && (
                                <p className="text-xs font-bold text-slate-400 mt-0.5">{totalTrades.toLocaleString()} עסקאות סה"כ</p>
                            )}
                        </div>
                    </div>

                    {/* AI Summary */}
                    {aiSummary ? (
                        <div className="rounded-2xl bg-gradient-to-l from-blue-50 via-blue-50 to-cyan-50 border border-blue-100 p-4">
                            <div className="flex items-start gap-3">
                                <div className="grid h-9 w-9 flex-shrink-0 place-items-center rounded-xl bg-gradient-to-br from-[#0B4DFF] to-[#13C9C7] text-white text-base shadow-[0_6px_18px_rgba(11,77,255,.22)]">✨</div>
                                <div>
                                    <p className="text-xs font-black text-[#0B4DFF] mb-1">סיכום AI — יום מסחר</p>
                                    <p className="text-sm font-semibold text-slate-600 leading-6">{aiSummary}</p>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="rounded-2xl bg-slate-50 border border-slate-100 p-4 text-center">
                            <p className="text-sm font-semibold text-slate-400">נתוני מסחר יופיעו כאן ברגע שהברוקר מחובר ועסקאות מבוצעות</p>
                        </div>
                    )}
                </section>

        // ── Bot Section ──────────────────────────────────────────────────────────
        function BotSection({ connectedBroker, onConnectBroker, openTrades = [], setOpenTrades, tradeHistory = [], setTradeHistory }) {
            const [botActive, setBotActive] = useState(false);
            const [webhookKey, setWebhookKey] = useState("");
            const [loading, setLoading] = useState(false);
            const [err, setErr] = useState(null);
            const [success, setSuccess] = useState(null);
            const [activeTab, setActiveTab] = useState("dashboard");
            const [chartPeriod, setChartPeriod] = useState("30D");
            const [settings, setSettings] = useState({
                default_lots: "0.01", max_positions: "3", max_daily_trades: "10",
                max_daily_loss_pct: "4.5", max_total_loss_pct: "9.0",
                risk_per_trade_pct: "1.0",
                sl1_dollars: "50", sl2_dollars: "100", sl3_dollars: "150",
                tp_dollars: "100",
                daily_profit_target: "500", daily_loss_limit: "200",
                max_loss_per_trade: "50",
                ftmo_mode: true,
            });

            useEffect(() => {
                fetchBotData();
                const id = setInterval(fetchBotStatus, 5000);
                return () => clearInterval(id);
            }, []);

            async function fetchBotData() {
                try {
                    const [sRes, stRes, tRes] = await Promise.all([
                        fetch("/api/bot/settings"), fetch("/api/bot/status"), fetch("/api/bot/trades?limit=50"),
                    ]);
                    const [s, st, t] = await Promise.all([sRes.json(), stRes.json(), tRes.json()]);
                    if (s.ok) {
                        setWebhookKey(s.data._webhookKey || "");
                        setBotActive(s.data._active || false);
                        const clean = Object.fromEntries(Object.entries(s.data).filter(([k]) => !k.startsWith("_")));
                        if (Object.keys(clean).length) setSettings(prev => ({ ...prev, ...clean }));
                    }
                    if (st.ok) { setBotActive(st.data.active); setOpenTrades(st.data.openTrades || []); }
                    if (t.ok) setTradeHistory(t.data || []);
                } catch {}
            }

            async function fetchBotStatus() {
                try {
                    const res = await fetch("/api/bot/status");
                    const data = await res.json();
                    if (data.ok) { setBotActive(data.data.active); setOpenTrades(data.data.openTrades || []); }
                } catch {}
            }

            async function toggleBot() {
                setLoading(true); setErr(null);
                try {
                    let creds = null;
                    try { creds = JSON.parse(localStorage.getItem("empirex_broker_creds")); } catch {}
                    const settingsParsed = Object.fromEntries(
                        Object.entries(settings).map(([k, v]) => [k, k === "ftmo_mode" ? v : (parseFloat(v) || v)])
                    );
                    const res = await fetch("/api/bot/toggle", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ active: !botActive, creds, settings: settingsParsed }),
                    });
                    const data = await res.json();
                    if (!res.ok || !data.ok) { setErr(data.error || "שגיאה"); }
                    else {
                        setBotActive(!botActive);
                        setSuccess(!botActive ? "הבוט הופעל! מקבל אותות מ-TradingView..." : "הבוט הופסק");
                        setTimeout(() => setSuccess(null), 4000);
                    }
                } catch { setErr("שגיאת רשת"); }
                setLoading(false);
            }

            async function saveSettings() {
                setLoading(true); setErr(null);
                try {
                    const sp = Object.fromEntries(Object.entries(settings).map(([k, v]) => [k, k === "ftmo_mode" ? v : (parseFloat(v) || v)]));
                    const res = await fetch("/api/bot/settings", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(sp) });
                    const data = await res.json();
                    if (data.ok) { setSuccess("ההגדרות נשמרו"); setTimeout(() => setSuccess(null), 2000); }
                    else setErr(data.error || "שגיאה");
                } catch { setErr("שגיאת רשת"); }
                setLoading(false);
            }

            const [publicBaseUrl, setPublicBaseUrl] = useState(
                () => localStorage.getItem("empirex_tunnel_url") || ""
            );
            function savePublicUrl(val) {
                const trimmed = val.replace(/\/$/, "").trim();
                setPublicBaseUrl(trimmed);
                localStorage.setItem("empirex_tunnel_url", trimmed);
            }

            const effectiveBase = publicBaseUrl || window.location.origin;
            const webhookUrl = `${effectiveBase}/api/tradingview/webhook`;

            function copyWebhookUrl() {
                try { navigator.clipboard.writeText(webhookUrl); } catch {}
                setSuccess("URL הועתק ללוח"); setTimeout(() => setSuccess(null), 2000);
            }
            // No broker wall — UI renders with real state regardless of broker connection.

            /* ── derived stats ─────────────────────────────────────── */
            const today = new Date().toISOString().split("T")[0];
            const todayTrades = tradeHistory.filter(t => (t.opened_at || "").startsWith(today));
            const closedToday = todayTrades.filter(t => t.status === "closed");
            const todayWins = closedToday.filter(t => (t.pnl || 0) > 0).length;
            const todayPnl = closedToday.reduce((s, t) => s + (t.pnl || 0), 0);
            const totalPnl = tradeHistory.filter(t => t.status === "closed").reduce((s, t) => s + (t.pnl || 0), 0);
            const winRate = closedToday.length > 0 ? Math.round(todayWins / closedToday.length * 100) : 0;

            /* ── small helpers ─────────────────────────────────────── */
            const C = ({ children, className = "", style = {} }) => (
                <div className={`rounded-2xl ${className}`} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", ...style }}>{children}</div>
            );
            const DollarFmt = (n) => (n >= 0 ? "+" : "") + "$" + Math.abs(n).toFixed(2);

            /* ── mini chart (SVG sparkline from pnl history) ───────── */
            const pnlSeries = (() => {
                const closed = [...tradeHistory].filter(t => t.status === "closed" && t.pnl != null).sort((a, b) => (a.opened_at || "") > (b.opened_at || "") ? 1 : -1);
                let running = 0;
                return closed.map(t => { running += t.pnl; return running; });
            })();
            const ChartSVG = () => {
                if (pnlSeries.length < 2) return (
                    <div className="flex items-center justify-center h-full" style={{ color: "rgba(255,255,255,0.3)" }}>
                        <div className="text-center"><div className="text-4xl mb-2">📈</div><p className="text-xs font-semibold">ביצוע הבוט יוצג כאן לאחר העסקאות הראשונות</p></div>
                    </div>
                );
                const data = pnlSeries;
                const W = 600, H = 160, PAD = 20;
                const min = Math.min(0, ...data), max = Math.max(0, ...data);
                const range = max - min || 1;
                const px = (i) => PAD + (i / (data.length - 1)) * (W - PAD * 2);
                const py = (v) => H - PAD - ((v - min) / range) * (H - PAD * 2);
                const pts = data.map((v, i) => `${px(i)},${py(v)}`).join(" ");
                const last = data[data.length - 1];
                const clr = last >= 0 ? "#10b981" : "#ef4444";
                const fill = last >= 0 ? "rgba(16,185,129,0.15)" : "rgba(239,68,68,0.15)";
                const area = `${px(0)},${py(0)} ` + pts + ` ${px(data.length-1)},${py(0)}`;
                return (
                    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="gchart" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor={clr} stopOpacity="0.3" />
                                <stop offset="100%" stopColor={clr} stopOpacity="0" />
                            </linearGradient>
                        </defs>
                        <line x1={PAD} y1={py(0)} x2={W-PAD} y2={py(0)} stroke="rgba(255,255,255,0.08)" strokeWidth="1" strokeDasharray="4,4" />
                        <polygon points={area} fill="url(#gchart)" />
                        <polyline points={pts} fill="none" stroke={clr} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                        {data.length > 0 && <circle cx={px(data.length-1)} cy={py(last)} r="5" fill={clr} />}
                    </svg>
                );
            };

            /* ── FTMO compliance rows ─────────────────────────────── */
            const maxDailyLoss = parseFloat(settings.max_daily_loss_pct) || 4.5;
            const maxTotalLoss = parseFloat(settings.max_total_loss_pct) || 9.0;
            const ftmoItems = [
                { label: "הפסד יומי מקסימלי", value: maxDailyLoss + "%", limit: "≤ 5%", ok: maxDailyLoss <= 5 },
                { label: "הפסד כולל מקסימלי", value: maxTotalLoss + "%", limit: "≤ 10%", ok: maxTotalLoss <= 10 },
                { label: "פוזיציות מקסימום", value: String(settings.max_positions || 3), limit: "בו-זמנית", ok: true },
                { label: "עסקאות יומי", value: String(settings.max_daily_trades || 10), limit: "מקסימום", ok: true },
                { label: "מסחר סוף שבוע", value: "חסום", limit: "אוטומטי", ok: true, lock: true },
            ];

            /* ────────────────────────── DASHBOARD ──────────────────────────── */
            const DashTab = () => (
                <div className="space-y-4">
                    {/* Stats strip */}
                    <div className="grid grid-cols-5 gap-3">
                        {[
                            { label: "רווח/הפסד יומי", value: DollarFmt(todayPnl), sub: todayPnl >= 0 ? "+0.99%" : "-0.99%", pos: todayPnl > 0, neg: todayPnl < 0 },
                            { label: "רווח כולל", value: DollarFmt(totalPnl), sub: "", pos: totalPnl > 0, neg: totalPnl < 0 },
                            { label: "עסקאות פעילות", value: String(openTrades.length), sub: `מתוך ${settings.max_positions || 3} מקסימום`, pos: false },
                            { label: "אחוז הצלחה", value: closedToday.length > 0 ? winRate + "%" : "—", sub: `${todayWins}/${closedToday.length} עסקאות`, pos: winRate >= 50 },
                            { label: "עסקאות היום", value: String(todayTrades.length), sub: `מתוך ${settings.max_daily_trades || 10} מקס׳`, pos: false },
                        ].map(({ label, value, sub, pos, neg }) => (
                            <C key={label} className="p-4" style={{ background: "rgba(255,255,255,0.04)" }}>
                                <p className="text-[10px] font-bold mb-1.5" style={{ color: "rgba(255,255,255,0.45)" }}>{label}</p>
                                <p className={`text-xl font-black ${pos ? "text-emerald-400" : neg ? "text-red-400" : "text-white"}`}>{value}</p>
                                {sub && <p className="text-[10px] mt-0.5 font-semibold" style={{ color: "rgba(255,255,255,0.35)" }}>{sub}</p>}
                            </C>
                        ))}
                    </div>

                    {/* 3-col layout */}
                    <div className="grid gap-4" style={{ gridTemplateColumns: "260px 1fr 260px" }}>

                        {/* FTMO Compliance */}
                        <C className="p-5 space-y-2">
                            <div className="flex items-center gap-2 mb-3">
                                <div className="h-8 w-8 rounded-xl flex items-center justify-center text-base" style={{ background: "rgba(16,185,129,0.15)" }}>🛡</div>
                                <div>
                                    <p className="text-sm font-black text-white">FTMO Compliance</p>

        function JSparkline({ trend = [] }) {
            if (!trend || trend.length < 2) return null;
            const w = 56, h = 24, pad = 2;
            const min = Math.min(...trend), max = Math.max(...trend);
            const range = max - min || 1;
            const pts = trend.map((v, i) => {
                const x = pad + (i / (trend.length - 1)) * (w - pad * 2);
                const y = h - pad - ((v - min) / range) * (h - pad * 2);
                return `${x},${y}`;
            }).join(" ");
            const last = trend[trend.length - 1], first = trend[0];
            const color = last >= first ? "#10b981" : "#ef4444";
            return (
                <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="overflow-visible">
                    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        }

        function JAreaChart({ data = [] }) {
            if (!data || data.length < 2) return <div className="h-24 flex items-center justify-center text-xs text-slate-300">אין נתונים</div>;
            const w = 320, h = 80, pad = 4;
            const min = Math.min(...data), max = Math.max(...data);
            const range = max - min || 1;
            const pts = data.map((v, i) => {
                const x = pad + (i / (data.length - 1)) * (w - pad * 2);
                const y = h - pad - ((v - min) / range) * (h - pad * 2);
                return [x, y];
            });
            const linePts = pts.map(p => p.join(",")).join(" ");
            const areaPts = `${pts[0][0]},${h} ` + linePts + ` ${pts[pts.length - 1][0]},${h}`;
            const last = data[data.length - 1], first = data[0];
            const color = last >= first ? "#10b981" : "#ef4444";
            const fillColor = last >= first ? "rgba(16,185,129,0.12)" : "rgba(239,68,68,0.12)";
            return (
                <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="overflow-visible">
                    <polygon points={areaPts} fill={fillColor} />
                    <polyline points={linePts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        }

        function JDonut({ slices = [] }) {
            const total = slices.reduce((s, sl) => s + sl.value, 0) || 1;
            const r = 36, cx = 44, cy = 44, stroke = 14;
            let offset = 0;
            const circ = 2 * Math.PI * r;
            return (
                <svg width="88" height="88" viewBox="0 0 88 88">
                    {slices.map((sl, i) => {
                        const pct = sl.value / total;
                        const dash = pct * circ;
                        const el = (
                            <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={sl.color} strokeWidth={stroke}
                                strokeDasharray={`${dash} ${circ - dash}`}
                                strokeDashoffset={-offset * circ / total * r * 2 * Math.PI / (circ / r)}
                                style={{ transform: `rotate(${-90 + offset / total * 360}deg)`, transformOrigin: `${cx}px ${cy}px` }} />
                        );
                        offset += sl.value;
                        return el;
                    })}
                    <circle cx={cx} cy={cy} r={r - stroke / 2 - 2} fill="white" />
                </svg>
            );
        }

        function genAiSummary(period, cb) {
            if (!cb) return "אין נתוני ברוקר זמינים.";
            const { dailyPnl, dailyTrades = 0, dailyWins = 0, balance, equity, totalTrades, openPositions = 0, brokerLabel, currency = "USD", aiSummary } = cb;

                                    <p className="text-sm font-semibold text-slate-500 mb-5">בחר אילו התראות תרצה לקבל</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <Toggle on={notifs.email}     onChange={(v)=>saveNotifs({...notifs, email:v})}     label="התראות במייל"        sub="עדכוני חשבון ומסחר" />
                                        <Toggle on={notifs.push}      onChange={(v)=>saveNotifs({...notifs, push:v})}      label="התראות Push"          sub="דחיפה לדפדפן" />

                                        <Toggle on={notifs.trades}    onChange={(v)=>saveNotifs({...notifs, trades:v})}    label="עסקאות בוט"           sub="פתיחה/סגירה של עסקאות" />
                                        <Toggle on={notifs.news}      onChange={(v)=>saveNotifs({...notifs, news:v})}      label="חדשות שוק"            sub="כתבות שמשפיעות על תיק" />
                                        <Toggle on={notifs.ai}        onChange={(v)=>saveNotifs({...notifs, ai:v})}        label="AI Agent התראות"      sub="המלצות וניתוחי הסוכן" />
                                        <Toggle on={notifs.marketing} onChange={(v)=>saveNotifs({...notifs, marketing:v})} label="עדכוני מוצר ושיווק"    sub="פיצ'רים חדשים ומבצעים" />
                                    </div>
