                            {tab === "appearance" && (
                                <div>
                                    <h2 className="text-xl font-black text-[#07124A] mb-1">🎨 מראה</h2>
                                    <p className="text-sm font-semibold text-slate-500 mb-5">ערכת נושא ומראה ויזואלי</p>
                                    <div className="grid grid-cols-3 gap-3">
                                        {[["auto","🖥️ אוטומטי","עוקב אחר המערכת"],["light","☀️ בהיר","תמיד בהיר"],["dark","🌙 כהה","תמיד כהה"]].map(([k,t,sub])=>(
                                            <button key={k} onClick={()=>saveTheme(k)}
                                                className={`rounded-2xl border-2 p-5 text-right transition ${theme===k ? "border-[#0B4DFF] bg-blue-50 shadow" : "border-slate-200 bg-white hover:border-slate-300"}`}>
                                                <div className="text-lg font-black text-[#07124A]">{t}</div>
                                                <div className="text-xs text-slate-500 font-semibold mt-1">{sub}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {tab === "security" && (
                                <div>
                                    <h2 className="text-xl font-black text-[#07124A] mb-1">🔒 אבטחה</h2>
                                    <p className="text-sm font-semibold text-slate-500 mb-5">הגנה על החשבון שלך</p>
                                    <div className="space-y-3">
                                        <SecurityRow title="אימות דו-שלבי (2FA)" sub="הוסף שכבת אבטחה נוספת" cta="הפעל" />
                                        <SecurityRow title="שינוי סיסמה" sub="עדכן את סיסמת ההתחברות" cta="שנה" />
                                        <SecurityRow title="סשנים פעילים" sub="צפה במכשירים שמחוברים לחשבון" cta="צפה" />
                                        <SecurityRow title="היסטוריית כניסות" sub="50 הכניסות האחרונות" cta="פתח" />
                                        <SecurityRow title="מפתחות API" sub="ניהול מפתחות גישה לבוט" cta="נהל" />
                                    </div>
                                </div>
                            )}

                            {tab === "account" && (
                                <div>
                                    <h2 className="text-xl font-black text-[#07124A] mb-1">⚙️ ניהול חשבון</h2>
                                    <p className="text-sm font-semibold text-slate-500 mb-5">פעולות מתקדמות על החשבון</p>
                                    <div className="space-y-3">
                                        <SecurityRow title="ייצוא נתונים" sub="הורד את כל הנתונים שלך כ-ZIP" cta="ייצא" />
                                        <SecurityRow title="חיבור ברוקרים" sub="נהל את הברוקרים המחוברים" cta="פתח" />
                                        <SecurityRow title="מחיקת חשבון" sub="פעולה בלתי הפיכה" cta="מחק" danger />
                                    </div>
                                </div>
                            )}

                            {tab === "billing" && (
                                <div>
                                    <h2 className="text-xl font-black text-[#07124A] mb-1">💳 חיוב ומנוי</h2>
                                    <p className="text-sm font-semibold text-slate-500 mb-5">המנוי שלך ופרטי תשלום</p>
                                    <div className="rounded-2xl border-2 border-[#0B4DFF] bg-gradient-to-br from-blue-50 to-cyan-50 p-6 mb-4">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div className="text-2xl font-black text-[#07124A]">EMPIREX Pro</div>
                                                <div className="text-sm font-semibold text-slate-600 mt-1">חיוב הבא: 19 ביוני 2026 · $49/חודש</div>
                                            </div>
                                            <span className="rounded-full bg-emerald-500 text-white text-xs font-black px-3 py-1.5">פעיל</span>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <SecurityRow title="שדרג ל-Enterprise" sub="פיצ'רים מתקדמים + תמיכת VIP" cta="שדרג" />
                                        <SecurityRow title="עדכן כרטיס אשראי" sub="•••• 4242 — תוקף 12/27" cta="עדכן" />
                                        <SecurityRow title="חשבוניות" sub="הורד את כל החשבוניות הקודמות" cta="פתח" />
                                        <SecurityRow title="ביטול מנוי" sub="המנוי יישאר פעיל עד 19/06/2026" cta="בטל" danger />
                                    </div>
                                </div>
                            )}

                            {tab === "support" && (
                                <div>
                                    <h2 className="text-xl font-black text-[#07124A] mb-1">💬 תמיכה</h2>
                                    <p className="text-sm font-semibold text-slate-500 mb-5">צריך עזרה? אנחנו כאן</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <a href="mailto:support@empirexos.com" className="rounded-2xl border-2 border-slate-200 bg-white p-5 hover:border-[#0B4DFF] transition">
                                            <div className="text-2xl mb-2">📧</div>
                                            <div className="font-black text-[#07124A]">מייל לתמיכה</div>
                                            <div className="text-xs text-slate-500 font-semibold mt-1">support@empirexos.com</div>
                                        </a>
                                        <a href="#" className="rounded-2xl border-2 border-slate-200 bg-white p-5 hover:border-[#0B4DFF] transition">
                                            <div className="text-2xl mb-2">💬</div>
                                            <div className="font-black text-[#07124A]">צ'אט חי</div>
                                            <div className="text-xs text-slate-500 font-semibold mt-1">זמין 24/7</div>
                                        </a>
                                        <a href="#" className="rounded-2xl border-2 border-slate-200 bg-white p-5 hover:border-[#0B4DFF] transition">
                                            <div className="text-2xl mb-2">📚</div>
                                            <div className="font-black text-[#07124A]">מאגר ידע</div>
                                            <div className="text-xs text-slate-500 font-semibold mt-1">מדריכים ושאלות נפוצות</div>
                                        </a>
                                        <a href="#" className="rounded-2xl border-2 border-slate-200 bg-white p-5 hover:border-[#0B4DFF] transition">
                                            <div className="text-2xl mb-2">🐛</div>
                                            <div className="font-black text-[#07124A]">דווח על באג</div>
                                            <div className="text-xs text-slate-500 font-semibold mt-1">עזור לנו לשפר</div>
                                        </a>
                                    </div>
                                </div>
                            )}
                        </section>
                    </div>
                </div>
            );
        }

        function Field({ label, value, onChange, type="text", placeholder="" }) {
            return (
                <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">{label}</label>
                    <input type={type} value={value} onChange={(e)=>onChange(e.target.value)}
                        placeholder={placeholder}
                        className="w-full rounded-xl border border-slate-200 px-4 py-3 text-[#07124A] font-bold focus:outline-none focus:border-[#0B4DFF]" />
                </div>
            );
        }
        function Select({ label, value, onChange, options }) {
            return (
                <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">{label}</label>
                    <select value={value} onChange={(e)=>onChange(e.target.value)}
                        className="w-full rounded-xl border border-slate-200 px-4 py-3 text-[#07124A] font-bold bg-white focus:outline-none focus:border-[#0B4DFF]">
                        {options.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                    </select>
                </div>
            );
        }
        function SecurityRow({ title, sub, cta, danger=false }) {
            return (
                <div className="flex items-center justify-between rounded-xl border border-slate-200 bg-white p-4">
                    <button className={`rounded-xl px-5 py-2 text-sm font-black transition ${danger ? "bg-red-50 text-red-700 hover:bg-red-100" : "bg-[#0B4DFF] text-white hover:-translate-y-0.5"}`}>
                        {cta}
                    </button>
                    <div className="text-right">
                        <div className="text-sm font-black text-[#07124A]">{title}</div>
                        {sub && <div className="text-[11px] text-slate-500 font-semibold mt-0.5">{sub}</div>}
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════
        // SupportWidget — צ'אט עזרה 24/7 ציף שמאל למטה, עם קול אנושי בעברית
        // ════════════════════════════════════════════════════════════════════════
        function SupportWidget({ lang = "he" }) {
            const [open, setOpen] = useState(false);
            const [name, setName] = useState(() => { try { return localStorage.getItem("empirex_support_name") || ""; } catch { return ""; } });
            const [nameInput, setNameInput] = useState("");
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [sending, setSending] = useState(false);
            const [muted, setMuted] = useState(() => { try { return localStorage.getItem("empirex_support_muted") === "1"; } catch { return false; } });
            const scrollRef = React.useRef(null);

            // Pick best Hebrew (or locale) voice
            const voiceRef = React.useRef(null);
            useEffect(() => {
                function pickVoice() {
                    if (!("speechSynthesis" in window)) return;
                    const voices = window.speechSynthesis.getVoices();
                    const localeTag = lang === "he" ? "he" : lang;
                    // Prefer natural / Google / Microsoft female voices
                    const ranked = voices.map(v => {
                        let score = 0;
                        const vl = (v.lang || "").toLowerCase();
                        if (vl.startsWith(localeTag)) score += 100;
                        if (vl.startsWith("he")) score += 50;
                        const nm = (v.name || "").toLowerCase();
                        if (/google/.test(nm)) score += 20;
                        if (/microsoft/.test(nm)) score += 15;
                        if (/natural|neural|premium|enhanced/.test(nm)) score += 25;
                        if (/female|woman|asaf|carmit|hila|noa|sarah|samantha/.test(nm)) score += 10;
                        return { v, score };
                    }).sort((a,b)=>b.score-a.score);
                    voiceRef.current = ranked[0]?.v || null;
                }
                pickVoice();
                if ("speechSynthesis" in window) {
                    window.speechSynthesis.onvoiceschanged = pickVoice;
                }
            }, [lang]);

            function speak(text) {
                if (muted) return;
                if (!("speechSynthesis" in window)) return;
                try {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = lang === "he" ? "he-IL" : lang;
                    if (voiceRef.current) u.voice = voiceRef.current;
                    u.rate = 1.02;
                    u.pitch = 1.05;
                    u.volume = 0.95;
                    window.speechSynthesis.speak(u);
                } catch {}
            }

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, open]);

            async function sendToBackend(message) {
                setSending(true);
                try {
                    const res = await fetch("/api/support/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, message, locale: lang, history: messages.slice(-10) }),
                    });
                    const j = await res.json();
                    const reply = j?.data?.reply || "לא הצלחתי לעבד את הבקשה כרגע. נסה שוב בעוד רגע.";
                    setMessages(prev => [...prev, { role: "agent", text: reply, ts: Date.now() }]);
                    speak(reply);
                } catch (e) {
                    const fallback = "יש בעיית רשת. בדוק את החיבור ונסה שוב.";
                    setMessages(prev => [...prev, { role: "agent", text: fallback, ts: Date.now() }]);
                } finally {
                    setSending(false);
                }
            }

            async function handleOpen() {
                setOpen(true);
                if (name && messages.length === 0) {
                    // Greet immediately on first open
                    await sendToBackend("שלום");
                }
            }

            function submitName() {
                const n = nameInput.trim();
                if (!n) return;
                try { localStorage.setItem("empirex_support_name", n); } catch {}
                setName(n);
                setNameInput("");
                // Trigger backend greeting with new name
                (async () => {
                    setSending(true);
                    try {
                        const res = await fetch("/api/support/chat", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ name: n, message: "שלום", locale: lang, history: [] }),
                        });
                        const j = await res.json();
                        const reply = j?.data?.reply || `שלום ${n}! איך אעזור?`;
                        setMessages([{ role: "agent", text: reply, ts: Date.now() }]);
                        speak(reply);
                    } catch {
                        setMessages([{ role: "agent", text: `שלום ${n}! איך אעזור?`, ts: Date.now() }]);
                    } finally {
                        setSending(false);
                    }
                })();
            }

            async function submitMessage(e) {
                e?.preventDefault();
                const msg = input.trim();
                if (!msg || sending) return;
                setInput("");
                setMessages(prev => [...prev, { role: "user", text: msg, ts: Date.now() }]);
                await sendToBackend(msg);
            }

            function toggleMute() {
                const next = !muted;
                setMuted(next);
                try { localStorage.setItem("empirex_support_muted", next ? "1" : "0"); } catch {}
                if (next && "speechSynthesis" in window) window.speechSynthesis.cancel();
            }

            const labels = {
                title: t("support_title", lang),
                intro: t("support_intro", lang),
                nameLabel: t("name_label", lang),
                cont: t("continue", lang),
                typeMsg: t("type_message", lang),
                send: t("send", lang),
                mute: t("mute", lang),
                unmute: t("unmute", lang),
                help: t("help_24_7", lang),
            };

            return (
                <>
                    {!open && (
                        <button
                            onClick={handleOpen}
                            aria-label={labels.help}
                            title={labels.help}
                            className="fixed bottom-6 left-6 z-[60] grid h-16 w-16 place-items-center rounded-full text-white shadow-[0_18px_40px_rgba(11,77,255,0.45)] hover:scale-105 transition"
                            style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }}
                        >
                            <span className="absolute inset-0 rounded-full animate-ping opacity-30" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }} />
                            <svg viewBox="0 0 24 24" className="relative h-7 w-7" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 12a9 9 0 0 1-13 8L3 21l1-5a9 9 0 1 1 17-4Z" />
                                <circle cx="8.5" cy="12" r="0.8" fill="currentColor" stroke="none" />
                                <circle cx="12" cy="12" r="0.8" fill="currentColor" stroke="none" />
                                <circle cx="15.5" cy="12" r="0.8" fill="currentColor" stroke="none" />
                            </svg>
                            <span className="absolute -top-1 -right-1 grid h-5 w-5 place-items-center rounded-full bg-emerald-500 text-[10px] font-black text-white ring-2 ring-white">24/7</span>
                        </button>
                    )}
                    {open && (
                        <div
                            className="fixed bottom-6 left-6 z-[60] flex w-[380px] max-w-[calc(100vw-2rem)] flex-col overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-[0_24px_60px_rgba(7,18,74,0.25)]"
                            style={{ height: "min(540px, 80vh)" }}
                            dir={RTL_LANGS.includes(lang) ? "rtl" : "ltr"}
                        >
                            <div className="flex items-center justify-between gap-3 px-4 py-3 text-white" style={{ background: "linear-gradient(135deg,#07124A 0%,#0B4DFF 60%,#15D7D1 100%)" }}>
                                <div className="flex items-center gap-2 min-w-0">
                                    <div className="grid h-10 w-10 place-items-center rounded-full bg-white/15 backdrop-blur-sm">
                                        <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <circle cx="12" cy="8" r="3" />
                                            <path d="M6 21a6 6 0 0 1 12 0" />
                                        </svg>
                                    </div>
                                    <div className="min-w-0">
                                        <p className="text-sm font-black leading-tight truncate">{labels.title}</p>
                                        <p className="text-[11px] font-semibold opacity-90 flex items-center gap-1">
                                            <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse" /> {labels.help}
                                        </p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button onClick={toggleMute} title={muted ? labels.unmute : labels.mute} className="grid h-8 w-8 place-items-center rounded-full hover:bg-white/15">
                                        {muted ? (
                                            <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                                        ) : (
                                            <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                        )}
                                    </button>
                                    <button onClick={() => setOpen(false)} aria-label="Close" className="grid h-8 w-8 place-items-center rounded-full hover:bg-white/15 text-xl leading-none font-black">×</button>
                                </div>
                            </div>

                            {!name ? (
                                <div className="flex-1 flex flex-col items-center justify-center gap-4 p-6 text-center">
                                    <div className="grid h-16 w-16 place-items-center rounded-full" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }}>
                                        <svg viewBox="0 0 24 24" className="h-8 w-8 text-white" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="3"/><path d="M6 21a6 6 0 0 1 12 0"/></svg>
                                    </div>
                                    <p className="text-base font-black text-[#07124A]">{labels.intro}</p>
                                    <p className="text-xs font-semibold text-slate-500 -mt-2">לפני שנתחיל, ספר לי איך לקרוא לך — כדי שאוכל לעזור באופן אישי.</p>
                                    <form onSubmit={(e)=>{e.preventDefault();submitName();}} className="w-full flex flex-col gap-2">
                                        <input
                                            autoFocus
                                            value={nameInput}
                                            onChange={(e)=>setNameInput(e.target.value)}
                                            placeholder={labels.nameLabel}
                                            className="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-[#07124A] outline-none focus:border-[#0B4DFF]"
                                        />
                                        <button type="submit" disabled={!nameInput.trim()} className="w-full rounded-2xl px-4 py-3 text-sm font-black text-white disabled:opacity-50" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }}>
                                            {labels.cont}
                                        </button>
                                    </form>
                                </div>
                            ) : (
                                <>
                                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                        {messages.length === 0 && (
                                            <div className="text-center text-xs font-semibold text-slate-400 py-8">מתחיל שיחה...</div>
                                        )}
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                                                <div className={`max-w-[78%] rounded-2xl px-3 py-2 text-sm font-semibold whitespace-pre-wrap ${
                                                    m.role === "user"
                                                        ? "bg-[#0B4DFF] text-white rounded-br-sm"
                                                        : "bg-white border border-slate-200 text-[#07124A] rounded-bl-sm shadow-sm"
                                                }`}>
                                                    {m.text}
                                                </div>
                                            </div>
                                        ))}
                                        {sending && (
                                            <div className="flex justify-start">
                                                <div className="bg-white border border-slate-200 rounded-2xl rounded-bl-sm px-3 py-2 text-sm text-slate-500 shadow-sm">
                                                    <span className="inline-flex gap-1">
                                                        <span className="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style={{ animationDelay: "0ms" }} />
                                                        <span className="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style={{ animationDelay: "150ms" }} />
                                                        <span className="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style={{ animationDelay: "300ms" }} />
                                                    </span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <form onSubmit={submitMessage} className="flex items-center gap-2 border-t border-slate-200 bg-white p-3">
                                        <input
                                            value={input}
                                            onChange={(e)=>setInput(e.target.value)}
                                            placeholder={labels.typeMsg}
                                            className="flex-1 rounded-2xl border border-slate-200 px-4 py-2.5 text-sm font-semibold text-[#07124A] outline-none focus:border-[#0B4DFF]"
                                            disabled={sending}
                                        />
                                        <button type="submit" disabled={!input.trim() || sending} className="grid h-10 w-10 place-items-center rounded-2xl text-white disabled:opacity-50" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }} title={labels.send}>
                                            <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{ transform: RTL_LANGS.includes(lang) ? "scaleX(-1)" : "none" }}>
                                                <path d="M22 2 11 13" /><path d="m22 2-7 20-4-9-9-4 20-7Z" />
                                            </svg>
                                        </button>
                                    </form>
                                </>
                            )}
                        </div>
                    )}
                </>
            );
        }

        function EmpirexHomeAfterSignup() {
            const TEMP_ALLOW_HOME_WITHOUT_LOGIN = false;
            const [userName, setUserName] = useState(getUserNameFromContext);
            const [lang, setLang] = useState(getLang);
            useEffect(() => {
                applyLangToDocument(lang);
            }, [lang]);
            useEffect(() => {
                function onLang(e) { if (e?.detail?.lang) setLang(e.detail.lang); }
                window.addEventListener("empirex:lang", onLang);
                return () => window.removeEventListener("empirex:lang", onLang);
            }, []);
            const [marketData, setMarketData] = useState({ fx: fallbackFx, stocks: fallbackStocks, source: "fallback" });
            const [lastUpdated, setLastUpdated] = useState(null);
            const [loading, setLoading] = useState(false);
            const [refreshed, setRefreshed] = useState(false);
            const [authChecked, setAuthChecked] = useState(false);
            const [activeSection, setActiveSection] = useState("בית");
            const [searchQuery, setSearchQuery] = useState("");
            const [chartItem, setChartItem] = useState(null);
            const [chartItemType, setChartItemType] = useState(null);
            const [brokerWizardOpen, setBrokerWizardOpen] = useState(false);
            const [connectedBroker, setConnectedBroker] = useState(() => {
                try { return JSON.parse(localStorage.getItem("empirex_broker_connection")); } catch { return null; }
            });
            const [brokerDataLoading, setBrokerDataLoading] = useState(false);
            // Ref to guard against concurrent market data fetches (avoids stale closure issue)
            const marketFetchingRef = React.useRef(false);
            const [botOpenTrades, setBotOpenTrades] = useState([]);
            const [botTradeHistory, setBotTradeHistory] = useState([]);

            async function refreshBrokerData() {
                let savedCreds = null;
                try { savedCreds = JSON.parse(localStorage.getItem("empirex_broker_creds")); } catch {}
                if (!savedCreds || !savedCreds.server || !savedCreds.login || !savedCreds.password) return;
                setBrokerDataLoading(true);
                try {
                    const res = await fetch("/api/broker/trades", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(savedCreds),
                    });
                    if (!res.ok) return;
                    const result = await res.json();
                    if (!result.ok) return;
                    const acct = result.data;
                    setConnectedBroker(prev => {
                        if (!prev) return prev;
                        const updated = {
                            ...prev,
                            balance: acct.balance ?? prev.balance,
                            equity: acct.equity ?? prev.equity,
                            totalTrades: acct.totalTrades ?? prev.totalTrades,
                            openPositions: acct.openPositions ?? prev.openPositions,
                            dailyPnl: acct.dailyPnl ?? prev.dailyPnl,
                            dailyTrades: acct.dailyTrades ?? prev.dailyTrades,
                            dailyWins: acct.dailyWins ?? prev.dailyWins,
                            aiSummary: acct.aiSummary || prev.aiSummary,
                        };
                        try { localStorage.setItem("empirex_broker_connection", JSON.stringify(updated)); } catch {}
                        return updated;
                    });
                } catch {}
                setBrokerDataLoading(false);
            }

            const dateLabel = useMemo(() => {
                if (!lastUpdated) return "ממתין לעדכון";
                return new Intl.DateTimeFormat("he-IL", {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                }).format(lastUpdated);
            }, [lastUpdated]);

            async function refreshData() {
                if (marketFetchingRef.current) return;
                marketFetchingRef.current = true;
                setLoading(true);
                setRefreshed(false);
                const data = await fetchMarketData();
                setMarketData((prev) => {
                    const previousBySymbol = new Map(
                        [...(prev?.fx || []), ...(prev?.stocks || [])].map((item) => [item.symbol, item.history || []])
                    );

                    const attachHistory = (list) =>
                        list.map((item) => {
                            const currentPrice = typeof item.price === "number" ? item.price : Number(item.price);
                            const prevHistory = previousBySymbol.get(item.symbol) || [];
                            const apiHistory = Array.isArray(item.history) ? item.history.filter((v) => typeof v === "number" && !Number.isNaN(v)) : [];
                            const nextHistory = (apiHistory.length ? apiHistory : [...prevHistory, currentPrice])
                                .filter((v) => typeof v === "number" && !Number.isNaN(v))
                                .slice(-60);
                            return { ...item, history: nextHistory };
                        });

                    return {
                        ...data,
                        fx: attachHistory(data.fx || []),
                        stocks: attachHistory(data.stocks || []),
                    };
                });
                setLastUpdated(new Date());
                marketFetchingRef.current = false;
                setLoading(false);
                setRefreshed(true);
                setTimeout(() => setRefreshed(false), 2500);
            }

            const filteredFx = useMemo(() => {
                const query = searchQuery.trim().toLowerCase();
                if (!query) return marketData.fx;
                return (marketData.fx || []).filter((item) => {
                    const symbol = String(item.symbol || "").toLowerCase();
                    const name = String(item.name || "").toLowerCase();
                    return symbol.includes(query) || name.includes(query);
                });
            }, [marketData.fx, searchQuery]);

            const filteredStocks = useMemo(() => {
                const query = searchQuery.trim().toLowerCase();
                if (!query) return marketData.stocks;
                return (marketData.stocks || []).filter((item) => {
                    const symbol = String(item.symbol || "").toLowerCase();
                    const name = String(item.name || "").toLowerCase();
                    return symbol.includes(query) || name.includes(query);
                });
            }, [marketData.stocks, searchQuery]);

            function goToConstructionPage(sectionLabel) {
                const section = encodeURIComponent(sectionLabel || "מודול");
                window.location.assign(`./module-under-construction.html?section=${section}`);
            }

            function handleNavigate(sectionLabel) {
                setActiveSection(sectionLabel);
                const inline = ["בית","יומן","אוטומציה","AI Agent","שווקים","הגדרות"];
                if (inline.includes(sectionLabel)) {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                } else {
                    goToConstructionPage(navMeta[sectionLabel] || sectionLabel);
                }
            }

            function handleAction(sectionLabel) {
                if (sectionLabel === "חבר ברוקר") {
                    setBrokerWizardOpen(true);
                    return;
                }
                goToConstructionPage(sectionLabel);
            }

            function handleDisconnectBroker() {
                setConnectedBroker(null);
                try { localStorage.removeItem("empirex_broker_connection"); } catch {}
                try { localStorage.removeItem("empirex_broker_creds"); } catch {}
            }

            function handleOpenChart(item, type) {
                setChartItem(item);
                setChartItemType(type);
            }

            useEffect(() => {
                // Decode HMAC-signed token payload locally (without verifying signature)
                // so the user is never bounced to login when the server has a temporary
                // hiccup. The server still validates on every API call that needs auth.
                function decodeLocalToken(tok) {
                    try {
                        if (!tok || typeof tok !== "string") return null;
                        const parts = tok.split(".");
                        if (parts.length !== 2) return null;
                        let b = parts[0].replace(/-/g, "+").replace(/_/g, "/");
                        const pad = b.length % 4; if (pad) b += "=".repeat(4 - pad);
                        const json = decodeURIComponent(escape(atob(b)));
                        const payload = JSON.parse(json);
                        if (!payload || typeof payload !== "object") return null;
                        if (payload.exp && payload.exp * 1000 < Date.now()) return null;
                        return payload;
                    } catch { return null; }
                }

                const validateSession = async () => {
                    if (TEMP_ALLOW_HOME_WITHOUT_LOGIN) {
                        setAuthChecked(true);
                        return;
                    }

                    if (window.location.protocol === "file:") {
                        setAuthChecked(true);
                        return;
                    }

                    const sessionToken = localStorage.getItem("empirex_session_token");
                    if (!sessionToken) {
                        window.location.replace("/?reason=auth-required");
                        return;
                    }

                    // Fast-path: trust well-formed, unexpired token locally — never bounce
                    // the user out due to a slow/cold-started backend.
                    const localPayload = decodeLocalToken(sessionToken);
                    if (localPayload) {
                        if (localPayload.name) setUserName(localPayload.name);
                        else setUserName(getUserNameFromContext());
                        setAuthChecked(true);
                    }

                    // Background validation: only kick out on a *definite* 401 from the
                    // server. Network errors, 5xx, or timeouts → keep the user logged in.
                    try {
                        const response = await fetch(`/api/session/validate?token=${encodeURIComponent(sessionToken)}`);
                        if (response.status === 401) {
                            localStorage.removeItem("empirex_session_token");
                            window.location.replace("/?reason=session-expired");
                            return;
                        }
                        if (response.ok) {
                            const result = await response.json();
                            if (result && result.ok && result.data) {
                                if (result.data.fullName) setUserName(result.data.fullName);
                                if (!localPayload) setAuthChecked(true);
                            }
                        } else if (!localPayload) {
                            // Server unreachable AND no local payload → kick to login
                            localStorage.removeItem("empirex_session_token");
                            window.location.replace("/?reason=session-expired");
                        }
                    } catch (error) {
                        // Network failure — if we have local payload, stay logged in.
                        if (!localPayload) {
                            localStorage.removeItem("empirex_session_token");
                            window.location.replace("/?reason=session-expired");
                        }
                    }
                };

                validateSession();
            }, []);

            useEffect(() => {
                if (!authChecked) return;
                // Initial load via regular fetch
                refreshData();
                // SSE real-time stream — replaces polling
                let es;
                try {
                    es = new EventSource("/api/market/stream");
                    es.onmessage = (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            if (data.type === "market") {
                                setMarketData(prev => {
                                    const prevBySymbol = new Map(
                                        [...(prev?.fx || []), ...(prev?.stocks || [])].map(item => [item.symbol, item.history || []])
                                    );
                                    const attachHistory = (list) => list.map((item) => {
                                        const cp = typeof item.price === "number" ? item.price : Number(item.price);
                                        const ph = prevBySymbol.get(item.symbol) || [];
                                        const ah = Array.isArray(item.history) ? item.history.filter(v => typeof v === "number" && !isNaN(v)) : [];
                                        const nh = (ah.length ? ah : [...ph, cp]).filter(v => typeof v === "number" && !isNaN(v)).slice(-60);
                                        return { ...item, history: nh };
                                    });
                                    return { ...data, fx: attachHistory(data.fx || []), stocks: attachHistory(data.stocks || []) };
                                });
                                setLastUpdated(new Date());
                                marketFetchingRef.current = false;
                                setLoading(false);
                            }
                            if (data.type === "bot_positions") {
                                setBotOpenTrades(data.positions || []);
                            }
                            if (data.type === "bot_trade_opened") {
                                setBotOpenTrades(prev => [...prev, data]);
                            }
                            if (data.type === "bot_trade_closed") {
                                setBotOpenTrades(prev => prev.filter(t => t.ticket !== data.ticket));
                                // Refresh history
                                fetch("/api/bot/trades?limit=50").then(r => r.json()).then(d => { if (d.ok) setBotTradeHistory(d.data || []); }).catch(() => {});
                            }
                        } catch {}
                    };
                    es.onerror = () => {
                        // SSE failed, fall back to interval
                        const id = setInterval(refreshData, 5000);
                        return () => clearInterval(id);
                    };
                } catch {
                    // No SSE support — fallback
                    const id = setInterval(refreshData, 5000);
                    return () => clearInterval(id);
                }
                return () => { try { es.close(); } catch {} };
            }, [authChecked]);

            // Poll MT5 broker data every 30 seconds when connected
            useEffect(() => {
                if (!connectedBroker) return;
                const isMT = connectedBroker.platformId === "mt4" || connectedBroker.platformId === "mt5";
                if (!isMT) return;
                const id = setInterval(refreshBrokerData, 30000);
                return () => clearInterval(id);
            }, [connectedBroker?.brokerId]);

            if (!authChecked) {
                return (
                    <div className="min-h-screen grid place-items-center bg-[#F7FAFF] text-[#07124A]">
                        <p className="text-lg font-black">מאמת הרשאה...</p>
                    </div>
                );
            }

            const DARK_BG = "radial-gradient(circle at 20% 30%, rgba(59,130,246,.22), transparent 32%), radial-gradient(circle at 82% 18%, rgba(34,211,238,.15), transparent 28%), radial-gradient(circle at 50% 100%, rgba(124,58,237,.20), transparent 36%), linear-gradient(180deg, #050a24 0%, #06113a 50%, #020617 100%)";
            const PAGE_BG = {
                "יומן":      DARK_BG,
                "אוטומציה":  "linear-gradient(160deg,#E0F2FE 0%,#BAE6FD 40%,#7DD3FC 100%)",
                "AI Agent":  DARK_BG,
                "שווקים":    "linear-gradient(160deg,#FFF7ED 0%,#FFEDD5 40%,#FED7AA 100%)",
                "הגדרות":   "linear-gradient(160deg,#F5F3FF 0%,#EDE9FE 40%,#DDD6FE 100%)",
            };
            const pageBg = PAGE_BG[activeSection];
            const isDarkPage = activeSection === "AI Agent" || activeSection === "יומן";
            return (
                <div dir="rtl" className={`min-h-screen ${isDarkPage ? "text-white" : "text-[#07124A]"} selection:bg-cyan-200/60 relative`} style={pageBg ? { background: pageBg } : { background:"#F7FAFF" }}>
                    {/* Grid overlay for dark pages (Journal + Agent) — matches the design spec */}
                    {isDarkPage && (
                        <div className="pointer-events-none fixed inset-0 z-0"
                             style={{
                                 backgroundImage: "linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px)",
                                 backgroundSize: "64px 64px",
                             }} />
                    )}
                    {!pageBg && <div className="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_12%_10%,rgba(24,139,255,.12),transparent_28%),radial-gradient(circle_at_88%_12%,rgba(19,201,199,.12),transparent_28%),linear-gradient(135deg,#FFFFFF_0%,#F7FAFF_48%,#EEF5FF_100%)]" />}
                    <Header
                        userName={userName}
                        active={activeSection}
                        onNavigate={handleNavigate}
                        searchQuery={searchQuery}
                        onSearchChange={setSearchQuery}
                        onSearchSubmit={() => {
                            const section = document.getElementById("market-sections");
                            if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
                        }}
                        onOpenPlaceholder={handleAction}
                        lang={lang}
                    />

                    <main className="px-5 pb-10 relative z-10">
                        {activeSection === "יומן" ? (
                            <JournalSection
                                connectedBroker={connectedBroker || { brokerLabel:"ללא ברוקר", platformLabel:"—", currency:"USD" }}
                                isRefreshing={brokerDataLoading}
                                onRefresh={refreshBrokerData}
                                onConnectBroker={() => setBrokerWizardOpen(true)}
                                onDisconnect={handleDisconnectBroker}
                                botTrades={botTradeHistory}
                            />
                        ) : activeSection === "אוטומציה" ? (
                            <BotSection
                                connectedBroker={connectedBroker || { brokerLabel:"ללא ברוקר", platformLabel:"—", platformId:"", currency:"USD" }}
                                onConnectBroker={() => setBrokerWizardOpen(true)}
                                openTrades={botOpenTrades}
                                setOpenTrades={setBotOpenTrades}
                                tradeHistory={botTradeHistory}
                                setTradeHistory={setBotTradeHistory}
                            />
                        ) : activeSection === "AI Agent" ? (
                            <AgentSection
                                connectedBroker={connectedBroker || { brokerLabel:"ללא ברוקר", platformLabel:"—" }}
                                onConnectBroker={() => setBrokerWizardOpen(true)}
                            />
                        ) : activeSection === "שווקים" ? (
                            <MarketsSection marketData={marketData} />
                        ) : activeSection === "הגדרות" ? (
                            <SettingsSection userName={userName} setUserName={setUserName} />
                        ) : (<>
                        <Hero userName={userName} onAction={handleAction} connectedBroker={connectedBroker} onDisconnect={handleDisconnectBroker} lang={lang} />

                        <div className="mx-auto mt-7 flex max-w-[1320px] flex-wrap items-center justify-between gap-4 px-2">
                            <div className="flex items-center gap-3 text-sm font-bold text-slate-500">
                                <span className="relative flex h-2.5 w-2.5">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75" />
                                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500" />
                                </span>
                                <span className="text-emerald-600 font-black text-xs">{t("live_label", lang)}</span>
                                <span className="text-slate-300">•</span>
                                <span>{t("last_update", lang)} {dateLabel}</span>
                                <span className="text-slate-300">•</span>
                                <span>{marketData.source === "live-api" ? t("data_live", lang) : marketData.source === "partial-fallback" ? t("data_partial", lang) : t("data_fb", lang)}</span>
                            </div>
                            <button onClick={refreshData} disabled={loading}
                                className={`flex items-center gap-2 rounded-2xl border px-4 py-3 text-sm font-black shadow-sm transition hover:-translate-y-0.5 hover:shadow-md disabled:opacity-70 ${refreshed ? "border-emerald-200 bg-emerald-50 text-emerald-700" : "border-slate-200 bg-white text-[#07124A]"}`}>
                                {loading ? (
                                    <svg className="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity=".3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>
                                ) : refreshed ? (
                                    <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 13l4 4L19 7" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                ) : (
                                    <Icon name="refresh" className="h-4 w-4" />
                                )}
                                {loading ? "מרענן..." : refreshed ? "עודכן!" : "רענן נתונים"}
                            </button>
                        </div>

                        <div className="mx-auto mt-3 max-w-[1320px] px-2">
                            <TradingViewTape />
                        </div>

                        <div id="market-sections" className="mx-auto mt-4 grid max-w-[1320px] gap-4">
                            <CarouselSection
                                title="מטבעות מט״ח חיים"
                                subtitle="30 הזוגות המובילים — מתעדכן בזמן אמת מ-TradingView."
                                items={filteredFx}
                                type="fx"
                                source={marketData.source}
                                onOpenChart={(item) => handleOpenChart(item, 'fx')}
                            />

                            <CarouselSection
                                title="המניות החזקות במעקב"
                                subtitle="30 המניות החזקות ביותר — נפח מסחר חי מ-TradingView."
                                items={filteredStocks}
                                type="stock"
                                source={marketData.source}
                                onOpenChart={(item) => handleOpenChart(item, 'stock')}
                            />

                            <SetupCards onAction={handleAction} lang={lang} />
                            <AiInsight onAction={handleAction} lang={lang} />
                        </div>
                        </>)}
                    </main>
                    {chartItem && (
                        <ChartModal
                            item={chartItem}
                            type={chartItemType}
                            onClose={() => { setChartItem(null); setChartItemType(null); }}
                        />
                    )}
                    {brokerWizardOpen && (
                        <BrokerWizardModal
                            onClose={() => setBrokerWizardOpen(false)}
                            onConnected={(conn) => { setConnectedBroker(conn); setBrokerWizardOpen(false); }}
                        />
                    )}
                    <SupportWidget lang={lang} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<EmpirexHomeAfterSignup />);
    </script>
</body>

</html>
