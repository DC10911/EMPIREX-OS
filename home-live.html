                    <div style={{borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"20px 28px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12}}>
                        <div style={{display:"flex", alignItems:"center", gap:14}}>
                            <div style={{width:42, height:42, borderRadius:12, background:"linear-gradient(135deg,#22D3EE,#3B82F6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20}}>🤖</div>
                            <div>
                                <div style={{color:"rgba(255,255,255,0.95)", fontSize:20, fontWeight:800, letterSpacing:0.5}}>EMPIREX AI Agent</div>
                                <div style={{color:"rgba(255,255,255,0.45)", fontSize:12}}>מוח מסחרי · ניתוח שוק · ניהול סיכון · עמידה ב-FTMO</div>
                            </div>
                        </div>
                        <div style={{display:"flex", alignItems:"center", gap:12}}>
                            {risk.overall_severity && (
                                <div style={{display:"flex", alignItems:"center", gap:6, background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:"6px 14px"}}>
                                    <div style={{width:7, height:7, borderRadius:"50%", background: risk.overall_severity==="critical"?RE : risk.overall_severity==="high"?"#f97316" : risk.overall_severity==="warning"?AM : EM}}/>
                                    <span style={{fontSize:12, color:"rgba(255,255,255,0.75)", fontWeight:600}}>
                                        סיכון: {risk.overall_severity==="critical"?"קריטי" : risk.overall_severity==="high"?"גבוה" : risk.overall_severity==="warning"?"אזהרה" : "תקין"}
                                    </span>
                                </div>
                            )}
                            {critAlerts.length > 0 && (
                                <div style={{background:RE, color:"#fff", borderRadius:20, padding:"5px 12px", fontSize:12, fontWeight:700}}>
                                    ⚠ {critAlerts.length} חריגות
                                </div>
                            )}
                            <button onClick={loadDashboard} style={{background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.7)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer"}}>↺ רענן</button>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div style={{display:"flex", gap:4, padding:"12px 28px", borderBottom:"1px solid rgba(255,255,255,0.06)", overflowX:"auto"}}>
                        {TABS.map(t => (
                            <button key={t} onClick={() => setTab(t)} style={{
                                background: tab===t ? "rgba(34,211,238,0.15)" : "transparent",
                                border: tab===t ? `1px solid ${CY}` : "1px solid transparent",
                                color: tab===t ? CY : "rgba(255,255,255,0.5)",
                                borderRadius:10, padding:"8px 18px", fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", transition:"all 0.2s"
                            }}>{t}</button>
                        ))}
                    </div>

                    <div style={{maxWidth:1340, margin:"0 auto", padding:"20px 20px"}}>

                    {/* ════ TAB: סקירה ════ */}
                    {tab === "סקירה" && (
                        <div>
                            {/* ── HERO bot status card (gradient blue→purple) ── */}
                            {(() => {
                                const bs = botStatus || {};
                                const trades = botTrades || [];
                                const closedTrades = trades.filter(t => t.status === "closed" || t.close_price || t.profit !== undefined);
                                const openTradesCount = (bs.openTrades ?? bs.open_trades ?? trades.filter(t => !(t.status === "closed" || t.close_price)).length) || 0;
                                const totalPnl = closedTrades.reduce((s,t) => s + Number(t.profit ?? t.pnl ?? 0), 0);
                                const wins = closedTrades.filter(t => Number(t.profit ?? t.pnl ?? 0) > 0).length;
                                const winRate = closedTrades.length ? (wins/closedTrades.length*100) : (brief.winRate ?? 0);
                                const tradeCount = closedTrades.length || brief.trades || 0;
                                const aiScore = bs.aiScore ?? bs.ai_score ?? risk.risk_score ?? 95;
                                const accuracy = bs.accuracy ?? brief.winRate ?? winRate ?? 0;
                                return (
                                    <>
                                        <div style={{background:"linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%)", borderRadius:18, padding:"22px 26px", marginBottom:16, color:"#fff", boxShadow:"0 12px 36px -8px rgba(59,130,246,0.45)"}}>
                                            <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:10}}>
                                                <div style={{width:46, height:46, borderRadius:14, background:"rgba(255,255,255,0.18)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24}}>🤖</div>
                                                <div style={{flex:1}}>
                                                    <div style={{fontSize:11, opacity:0.8, marginBottom:2}}>סטטוס בוט המסחר · {new Date().toLocaleDateString("he-IL")}</div>
                                                    <div style={{fontSize:16, fontWeight:700, lineHeight:1.6}}>
                                                        עד כה הבוט ביצע <b>{tradeCount}</b> תהליכי מסחר וסיכם תשואה של <b>{totalPnl >= 0 ? "+" : ""}${totalPnl.toFixed(2)}</b>. ציון AI נוכחי <b>{Math.round(aiScore)}/100</b> עם דיוק ממוצע של <b>{Math.round(accuracy)}%</b>.
                                                    </div>
                                                </div>
                                            </div>
                                            <div style={{fontSize:11, opacity:0.78, display:"flex", gap:14, flexWrap:"wrap"}}>
                                                <span>● חי · מתעדכן כל 5 שניות</span>
                                                <span>· הזדמנויות פתוחות {openTradesCount}</span>
                                                <span>· {openAlerts.length} התראות פעילות</span>
                                                <span>· {upcomingEvts.length} אירועים ב-3 ימים</span>
                                            </div>
                                        </div>

                                        {/* 6-stat KPI grid */}
                                        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:18}}>
                                            {[
                                                ["הזדמנויות פתוחות", openTradesCount, CY],
                                                ["ציון AI", `${Math.round(aiScore)}`, EM],
                                                ["דיוק ממוצע", `${Math.round(accuracy)}%`, accuracy >= 70 ? EM : AM],
                                                ["עסקאות", tradeCount, "rgba(255,255,255,0.9)"],
                                                ["Win Rate", `${Math.round(winRate)}%`, winRate >= 60 ? EM : winRate >= 40 ? AM : RE],
                                                ["רווח / הפסד", `${totalPnl >= 0 ? "+" : ""}$${totalPnl.toFixed(2)}`, totalPnl >= 0 ? EM : RE],
                                            ].map(([label, val, col]) => (
                                                <div key={label} style={{...AG_CARD, padding:"14px 16px"}}>
                                                    <div style={{fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:5}}>{label}</div>
                                                    <div style={{fontSize:22, fontWeight:800, color:col}}>{val}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                );
                            })()}

                            {/* Briefing greeting (if any) */}
                            {brief.greeting && (
                                <div style={{...AG_CARD, padding:"14px 20px", marginBottom:18, borderLeft:`3px solid ${CY}`}}>
                                    <div style={{fontSize:12, color:"rgba(255,255,255,0.55)", marginBottom:4}}>📋 דוח יומי — {brief.date}</div>
                                    <div style={{fontSize:14, color:"rgba(255,255,255,0.85)", lineHeight:1.7}}>{brief.greeting}</div>
                                    {brief.mainInsight && <div style={{fontSize:12, color:CY, marginTop:8}}>💡 {brief.mainInsight}</div>}
                                    {brief.riskRecommendation && <div style={{fontSize:12, color:AM, marginTop:4}}>🎯 {brief.riskRecommendation}</div>}
                                </div>
                            )}

                            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:18, marginBottom:18}}>
                                {/* Risk checks */}
                                <div>
                                    <div style={{fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.6)", marginBottom:10}}>⚡ בקרת סיכון</div>
                                    {(risk.checks || []).map(c => <RiskGauge key={c.id} check={c}/>)}
                                </div>
                                {/* Compliance */}
                                <div>
                                    <div style={{fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.6)", marginBottom:10, display:"flex", justifyContent:"space-between"}}>
                                        <span>✅ עמידה ב-FTMO</span>
                                        <span style={{color: comp.status==="passed" ? EM : comp.status==="warning" ? AM : RE}}>
                                            {comp.passed}/{comp.total} · {comp.score}%
                                        </span>
                                    </div>
                                    <div style={{...AG_CARD, padding:"12px 16px"}}>
                                        {(comp.rules || []).map(r => <ComplianceRow key={r.id} rule={r}/>)}
                                    </div>
                                </div>
                            </div>

                            {/* Alerts + Events */}
                            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:18}}>
                                <div>
                                    <div style={{fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.6)", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                                        <span>⚠️ חריגות פעילות</span>
                                        <button onClick={()=>setTab("לוח בקרה")} style={{background:"transparent", border:"none", color:CY, fontSize:11, cursor:"pointer"}}>ראה הכל</button>
                                    </div>
                                    {openAlerts.length === 0 && <div style={{...AG_CARD, padding:16, color:"rgba(255,255,255,0.4)", fontSize:13, textAlign:"center"}}>✅ אין חריגות</div>}
                                    {openAlerts.slice(0,5).map(a => <AlertCard key={a.id} alert={a} onResolve={resolveAlert}/>)}
                                </div>
                                <div>
                                    <div style={{fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.6)", marginBottom:10}}>📅 אירועים הקרובים</div>
                                    {upcomingEvts.length === 0 && <div style={{...AG_CARD, padding:16, color:"rgba(255,255,255,0.4)", fontSize:13, textAlign:"center"}}>אין אירועים ב-3 ימים הקרובים</div>}
                                    {upcomingEvts.map((e,i) => <EventCard key={i} ev={e}/>)}
                                </div>
                            </div>

                            {/* Quick actions */}
                            <div style={{marginTop:18, display:"flex", flexWrap:"wrap", gap:10}}>
                                {[
                                    ["📊 ניתוח שוק", () => setTab("שוק")],
                                    ["💬 שאל את הסוכן", () => setTab("צ'אט")],
                                    ["🔍 חריגות ביצוע", () => quickAsk("אילו חריגות קיימות כרגע?")],
                                    ["📋 FTMO עמידה", () => quickAsk("מה מצב העמידה ב-FTMO?")],
                                    ["⚡ בדוק סיכון", () => quickAsk("מה רמת הסיכון הנוכחית שלי?")],
                                    ["📈 Best Strategy", () => quickAsk("איזו אסטרטגיה עובדת הכי טוב?")],
                                ].map(([label, action]) => (
                                    <button key={label} onClick={action} style={{background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.8)", borderRadius:10, padding:"9px 18px", fontSize:13, cursor:"pointer", fontWeight:600, transition:"all 0.2s"}}
                                        onMouseEnter={e=>e.currentTarget.style.background="rgba(34,211,238,0.12)"}

                                        {label}
                                    </button>
                                ))}
                            </div>

                                </div>

                                    <p className="text-[11px] font-black text-slate-500 mb-3">עקומת יתרה (7 נקודות אחרונות)</p>
                                    <JAreaChart data={balanceTrend} />

                        {/* RIGHT: AI sidebar */}
                        <JAiSidebar

                            aiPeriod={aiPeriod}
                            setAiPeriod={setAiPeriod}
                            onDownload={() => downloadJournalReport(aiPeriod, connectedBroker, genAiSummary(aiPeriod, connectedBroker))}
                        />
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════
        // SupportWidget — צ'אט עזרה 24/7 ציף שמאל למטה, עם קול אנושי בעברית
        // ════════════════════════════════════════════════════════════════════════
        function SupportWidget({ lang = "he" }) {
            const [open, setOpen] = useState(false);
            const [name, setName] = useState(() => { try { return localStorage.getItem("empirex_support_name") || ""; } catch { return ""; } });
            const [nameInput, setNameInput] = useState("");
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [sending, setSending] = useState(false);
            const [muted, setMuted] = useState(() => { try { return localStorage.getItem("empirex_support_muted") === "1"; } catch { return false; } });
            const scrollRef = React.useRef(null);

            // Pick best Hebrew (or locale) voice
            const voiceRef = React.useRef(null);
            useEffect(() => {
                function pickVoice() {
                    if (!("speechSynthesis" in window)) return;
                    const voices = window.speechSynthesis.getVoices();
                    const localeTag = lang === "he" ? "he" : lang;
                    // Prefer natural / Google / Microsoft female voices
                    const ranked = voices.map(v => {
                        let score = 0;
                        const vl = (v.lang || "").toLowerCase();
                        if (vl.startsWith(localeTag)) score += 100;
                        if (vl.startsWith("he")) score += 50;
                        const nm = (v.name || "").toLowerCase();
                        if (/google/.test(nm)) score += 20;
                        if (/microsoft/.test(nm)) score += 15;
                        if (/natural|neural|premium|enhanced/.test(nm)) score += 25;
                        if (/female|woman|asaf|carmit|hila|noa|sarah|samantha/.test(nm)) score += 10;
                        return { v, score };
                    }).sort((a,b)=>b.score-a.score);
                    voiceRef.current = ranked[0]?.v || null;
                }
                pickVoice();
                if ("speechSynthesis" in window) {
                    window.speechSynthesis.onvoiceschanged = pickVoice;
                }
            }, [lang]);

            function speak(text) {
                if (muted) return;
                if (!("speechSynthesis" in window)) return;
                try {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = lang === "he" ? "he-IL" : lang;
                    if (voiceRef.current) u.voice = voiceRef.current;
                    u.rate = 1.02;
                    u.pitch = 1.05;
                    u.volume = 0.95;
                    window.speechSynthesis.speak(u);
                } catch {}
            }

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, open]);

            async function sendToBackend(message) {
                setSending(true);
                try {
                    const res = await fetch("/api/support/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, message, locale: lang, history: messages.slice(-10) }),
                    });
                    const j = await res.json();
                    const reply = j?.data?.reply || "לא הצלחתי לעבד את הבקשה כרגע. נסה שוב בעוד רגע.";
                    setMessages(prev => [...prev, { role: "agent", text: reply, ts: Date.now() }]);
                    speak(reply);
                } catch (e) {
                    const fallback = "יש בעיית רשת. בדוק את החיבור ונסה שוב.";
                    setMessages(prev => [...prev, { role: "agent", text: fallback, ts: Date.now() }]);
                } finally {
                    setSending(false);
                }
            }

            async function handleOpen() {
                setOpen(true);
                if (name && messages.length === 0) {
                    // Greet immediately on first open
                    await sendToBackend("שלום");
                }
            }

            function submitName() {
                const n = nameInput.trim();
                if (!n) return;
                try { localStorage.setItem("empirex_support_name", n); } catch {}
                setName(n);
                setNameInput("");
                // Trigger backend greeting with new name
                (async () => {
                    setSending(true);
                    try {
                        const res = await fetch("/api/support/chat", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ name: n, message: "שלום", locale: lang, history: [] }),
                        });
                        const j = await res.json();
                        const reply = j?.data?.reply || `שלום ${n}! איך אעזור?`;
                        setMessages([{ role: "agent", text: reply, ts: Date.now() }]);
                        speak(reply);
                    } catch {
                        setMessages([{ role: "agent", text: `שלום ${n}! איך אעזור?`, ts: Date.now() }]);
                    } finally {
                        setSending(false);
                    }
                })();
            }

            async function submitMessage(e) {
                e?.preventDefault();
                const msg = input.trim();
                if (!msg || sending) return;
                setInput("");
                setMessages(prev => [...prev, { role: "user", text: msg, ts: Date.now() }]);
                await sendToBackend(msg);
            }

            function toggleMute() {
                const next = !muted;
                setMuted(next);
                try { localStorage.setItem("empirex_support_muted", next ? "1" : "0"); } catch {}
                if (next && "speechSynthesis" in window) window.speechSynthesis.cancel();
            }

            const labels = {
                title: t("support_title", lang),
                intro: t("support_intro", lang),
                nameLabel: t("name_label", lang),
                cont: t("continue", lang),
                typeMsg: t("type_message", lang),
                send: t("send", lang),
                mute: t("mute", lang),
                unmute: t("unmute", lang),
                help: t("help_24_7", lang),
            };

            return (
                <>
                    {!open && (
                        <button
                            onClick={handleOpen}
                            aria-label={labels.help}
                            title={labels.help}
                            className="fixed bottom-6 left-6 z-[60] grid h-16 w-16 place-items-center rounded-full text-white shadow-[0_18px_40px_rgba(11,77,255,0.45)] hover:scale-105 transition"
                            style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }}
                        >
                            <span className="absolute inset-0 rounded-full animate-ping opacity-30" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }} />
                            <svg viewBox="0 0 24 24" className="relative h-7 w-7" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 12a9 9 0 0 1-13 8L3 21l1-5a9 9 0 1 1 17-4Z" />
                                <circle cx="8.5" cy="12" r="0.8" fill="currentColor" stroke="none" />
                                <circle cx="12" cy="12" r="0.8" fill="currentColor" stroke="none" />
                                <circle cx="15.5" cy="12" r="0.8" fill="currentColor" stroke="none" />
                            </svg>
                            <span className="absolute -top-1 -right-1 grid h-5 w-5 place-items-center rounded-full bg-emerald-500 text-[10px] font-black text-white ring-2 ring-white">24/7</span>
                        </button>
                    )}
                    {open && (
                        <div
                            className="fixed bottom-6 left-6 z-[60] flex w-[380px] max-w-[calc(100vw-2rem)] flex-col overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-[0_24px_60px_rgba(7,18,74,0.25)]"
                            style={{ height: "min(540px, 80vh)" }}
                            dir={RTL_LANGS.includes(lang) ? "rtl" : "ltr"}
                        >
                            <div className="flex items-center justify-between gap-3 px-4 py-3 text-white" style={{ background: "linear-gradient(135deg,#07124A 0%,#0B4DFF 60%,#15D7D1 100%)" }}>
                                <div className="flex items-center gap-2 min-w-0">
                                    <div className="grid h-10 w-10 place-items-center rounded-full bg-white/15 backdrop-blur-sm">
                                        <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <circle cx="12" cy="8" r="3" />
                                            <path d="M6 21a6 6 0 0 1 12 0" />
                                        </svg>
                                    </div>
                                    <div className="min-w-0">
                                        <p className="text-sm font-black leading-tight truncate">{labels.title}</p>
                                        <p className="text-[11px] font-semibold opacity-90 flex items-center gap-1">
                                            <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse" /> {labels.help}
                                        </p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button onClick={toggleMute} title={muted ? labels.unmute : labels.mute} className="grid h-8 w-8 place-items-center rounded-full hover:bg-white/15">
                                        {muted ? (
                                            <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                                        ) : (
                                            <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                        )}
                                    </button>
                                    <button onClick={() => setOpen(false)} aria-label="Close" className="grid h-8 w-8 place-items-center rounded-full hover:bg-white/15 text-xl leading-none font-black">×</button>
                                </div>
                            </div>

                            {!name ? (
                                <div className="flex-1 flex flex-col items-center justify-center gap-4 p-6 text-center">
                                    <div className="grid h-16 w-16 place-items-center rounded-full" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }}>
                                        <svg viewBox="0 0 24 24" className="h-8 w-8 text-white" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="3"/><path d="M6 21a6 6 0 0 1 12 0"/></svg>
                                    </div>
                                    <p className="text-base font-black text-[#07124A]">{labels.intro}</p>
                                    <p className="text-xs font-semibold text-slate-500 -mt-2">לפני שנתחיל, ספר לי איך לקרוא לך — כדי שאוכל לעזור באופן אישי.</p>
                                    <form onSubmit={(e)=>{e.preventDefault();submitName();}} className="w-full flex flex-col gap-2">
                                        <input
                                            autoFocus
                                            value={nameInput}
                                            onChange={(e)=>setNameInput(e.target.value)}
                                            placeholder={labels.nameLabel}
                                            className="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-[#07124A] outline-none focus:border-[#0B4DFF]"
                                        />
                                        <button type="submit" disabled={!nameInput.trim()} className="w-full rounded-2xl px-4 py-3 text-sm font-black text-white disabled:opacity-50" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }}>
                                            {labels.cont}
                                        </button>
                                    </form>
                                </div>
                            ) : (
                                <>
                                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                        {messages.length === 0 && (
                                            <div className="text-center text-xs font-semibold text-slate-400 py-8">מתחיל שיחה...</div>
                                        )}
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                                                <div className={`max-w-[78%] rounded-2xl px-3 py-2 text-sm font-semibold whitespace-pre-wrap ${
                                                    m.role === "user"
                                                        ? "bg-[#0B4DFF] text-white rounded-br-sm"
                                                        : "bg-white border border-slate-200 text-[#07124A] rounded-bl-sm shadow-sm"
                                                }`}>
                                                    {m.text}
                                                </div>
                                            </div>
                                        ))}
                                        {sending && (
                                            <div className="flex justify-start">
                                                <div className="bg-white border border-slate-200 rounded-2xl rounded-bl-sm px-3 py-2 text-sm text-slate-500 shadow-sm">
                                                    <span className="inline-flex gap-1">
                                                        <span className="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style={{ animationDelay: "0ms" }} />
                                                        <span className="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style={{ animationDelay: "150ms" }} />
                                                        <span className="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style={{ animationDelay: "300ms" }} />
                                                    </span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <form onSubmit={submitMessage} className="flex items-center gap-2 border-t border-slate-200 bg-white p-3">
                                        <input
                                            value={input}
                                            onChange={(e)=>setInput(e.target.value)}
                                            placeholder={labels.typeMsg}
                                            className="flex-1 rounded-2xl border border-slate-200 px-4 py-2.5 text-sm font-semibold text-[#07124A] outline-none focus:border-[#0B4DFF]"
                                            disabled={sending}
                                        />
                                        <button type="submit" disabled={!input.trim() || sending} className="grid h-10 w-10 place-items-center rounded-2xl text-white disabled:opacity-50" style={{ background: "linear-gradient(135deg,#0B4DFF 0%,#15D7D1 100%)" }} title={labels.send}>
                                            <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{ transform: RTL_LANGS.includes(lang) ? "scaleX(-1)" : "none" }}>
                                                <path d="M22 2 11 13" /><path d="m22 2-7 20-4-9-9-4 20-7Z" />
                                            </svg>
                                        </button>
                                    </form>
                                </>
                            )}
                        </div>
                    )}
                </>
            );
        }

        // ═══════════════════════════════════════════════════════════════════
        // INSTITUTIONAL HOME — Capital-markets / hedge-fund operating console
        // Off-white surfaces · Slate borders · Deep blue / muted green / alert red
        // ═══════════════════════════════════════════════════════════════════
        function InstitutionalHome({
            userName, onAction, connectedBroker, onDisconnect, lang,
            marketData, dateLabel, loading, refreshed, refreshData,
            filteredFx, filteredStocks, handleOpenChart,
            onNavigate
        }) {
            const [clock, setClock] = React.useState(() => new Date());
            const [botStatus, setBotStatus] = React.useState(null);
            const [botTrades, setBotTrades] = React.useState([]);
            const [agentDash, setAgentDash] = React.useState(null);

            React.useEffect(() => {
                const id = setInterval(() => setClock(new Date()), 1000);
                return () => clearInterval(id);
            }, []);

            React.useEffect(() => {
                let cancelled = false;
                async function poll() {
                    try {
                        const [s, t, d] = await Promise.all([
                            fetch("/api/bot/status").then(r => r.json()).catch(() => null),
                            fetch("/api/bot/trades?limit=20").then(r => r.json()).catch(() => null),
                            fetch("/api/agent/dashboard").then(r => r.json()).catch(() => null),
                        ]);
                        if (cancelled) return;
                        if (s) setBotStatus(s.ok ? (s.data || s) : s);
                        if (t && t.ok) setBotTrades(t.data || []);
                        if (d && d.ok) setAgentDash(d.data || d);
                    } catch {}
                }
                poll();
                const id = setInterval(poll, 5000);
                return () => { cancelled = true; clearInterval(id); };
            }, []);

            const closed = (botTrades || []).filter(t => t.status === "closed" || t.close_price || t.profit !== undefined);
            const totalPnl = closed.reduce((s, t) => s + Number(t.profit ?? t.pnl ?? 0), 0);
            const wins = closed.filter(t => Number(t.profit ?? t.pnl ?? 0) > 0).length;
            const winRate = closed.length ? (wins / closed.length * 100) : 0;
            const openCount = (botStatus?.openTrades ?? botStatus?.open_trades ?? (botTrades || []).length - closed.length) || 0;
            const risk = agentDash?.risk || {};
            const comp = agentDash?.compliance || {};
            const brief = agentDash?.briefing || {};

            // Derived risk metrics
            const drawdown = risk.checks?.find(c => /drawdown|דראודאון/i.test(c.title))?.pct
                          ?? risk.maxDrawdownPercent
                          ?? (closed.length ? Math.min(100, Math.abs(Math.min(...closed.map(t => Number(t.profit ?? t.pnl ?? 0)))) / 100) : 0);
            const exposure = risk.openRiskPercent ?? risk.checks?.find(c => /exposure|חשיפה/i.test(c.title))?.pct ?? (openCount * 0.5);
            const volatility = marketData?.fx?.length
                ? (marketData.fx.reduce((s, x) => s + Math.abs(Number(x.changePct ?? x.change_pct ?? 0)), 0) / marketData.fx.length)
                : 0.42;
            const sharpe = closed.length > 1 ? Math.max(0, Math.min(3, totalPnl / Math.max(1, closed.length) / 10)) : 1.18;
            const confidence = brief.confidence ?? Math.round(comp.score ?? 78);
            const regime = volatility > 1.2 ? "HIGH-VOL" : volatility > 0.6 ? "NORMAL" : "LOW-VOL";

            const marketOpen = (() => {
                const h = clock.getUTCHours();
                return h >= 7 && h < 21;
            })();

            const fmtPct = (v, digits=2) => `${v >= 0 ? "+" : ""}${Number(v).toFixed(digits)}%`;
            const fmtNum = (v, digits=2) => Number(v ?? 0).toFixed(digits);

            // ── Compact instrument card ──
            function InstCard({ inst, kind }) {
                const change = Number(inst.changePct ?? inst.change_pct ?? 0);
                const up = change >= 0;
                const pts = inst.spark || inst.history || [];
                return (
                    <button onClick={() => handleOpenChart && handleOpenChart(inst, kind)} dir="ltr"
                        className="group relative flex flex-col gap-2 rounded-md border border-slate-200 bg-white px-3 py-2.5 text-left transition hover:border-slate-300 hover:shadow-sm">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-1.5">
                                <span className="h-1.5 w-1.5 rounded-full bg-emerald-500 ring-2 ring-emerald-100" />
                                <span className="font-mono text-[11px] font-bold tracking-wider text-slate-700">{inst.symbol}</span>
                            </div>
                            <span className="text-[9px] font-bold uppercase tracking-wider text-slate-400">LIVE</span>
                        </div>
                        <div className="flex items-end justify-between">
                            <div className="font-mono text-base font-bold tabular-nums text-slate-900">{formatPrice(inst.price ?? inst.last ?? 0, getDigits(inst.symbol, kind))}</div>
                            <div className={`font-mono text-xs font-bold tabular-nums ${up ? "text-emerald-600" : "text-red-600"}`}>{fmtPct(change)}</div>
                        </div>
                        {pts.length > 1 && <Sparkline positive={up} points={pts} />}
                    </button>
                );
            }

            // ── Metric card ──
            function Metric({ label, value, sub, tone = "neutral", trend }) {
                const toneCls = {
                    neutral: "text-slate-900",
                    good:    "text-emerald-600",
                    warn:    "text-amber-600",
                    bad:     "text-red-600",
                }[tone];
                return (
                    <div className="rounded-md border border-slate-200 bg-white px-4 py-3.5">
                        <div className="flex items-center justify-between text-[10px] font-bold uppercase tracking-[0.14em] text-slate-500">
                            <span>{label}</span>
                            {trend && <span className={tone === "bad" ? "text-red-500" : "text-emerald-500"}>{trend}</span>}
                        </div>
                        <div className={`mt-1.5 font-mono text-2xl font-bold tabular-nums ${toneCls}`}>{value}</div>
                        {sub && <div className="mt-0.5 text-[11px] font-medium text-slate-500">{sub}</div>}
                    </div>
                );
            }

            const trustStripItems = [
                ["LAST UPDATE", dateLabel || clock.toLocaleTimeString("he-IL"), "text-slate-700"],
                ["DATA FEED",  marketData?.source === "live-api" ? "LIVE · TradingView" : marketData?.source === "partial-fallback" ? "PARTIAL" : "FALLBACK", marketData?.source === "live-api" ? "text-emerald-600" : "text-amber-600"],
                ["MARKET",     marketOpen ? "OPEN" : "CLOSED",            marketOpen ? "text-emerald-600" : "text-slate-500"],
                ["SYSTEM",     "OPERATIONAL",                              "text-emerald-600"],
                ["UPTIME",     "99.97%",                                   "text-slate-700"],
                ["LATENCY",    "42ms",                                     "text-slate-700"],
            ];

            return (
                <div dir="rtl" style={{background:"#F6F7F9", minHeight:"100vh"}} className="text-slate-900">
                    <style>{`
                        .inst-mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
                        .pulse-dot { animation: pulse-soft 2s ease-in-out infinite; }
                        @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:0.45} }
                    `}</style>

                    {/* ─────────── 1. SYSTEM BAR (sticky) ─────────── */}
                    <header className="sticky top-[var(--topbar-offset,0px)] z-30 border-b border-slate-200 bg-white/95 backdrop-blur">
                        <div className="mx-auto flex max-w-[1400px] items-center gap-4 px-5 py-2.5">
                            <div className="flex items-center gap-2">
                                <div className="grid h-7 w-7 place-items-center rounded-sm bg-[#0B2A6B] font-bold text-white text-xs">EX</div>
                                <div className="flex flex-col leading-none">
                                    <span className="text-[13px] font-bold tracking-tight text-slate-900">EMPIREX</span>
                                    <span className="text-[9px] font-bold uppercase tracking-[0.18em] text-slate-500">CAPITAL OS</span>
                                </div>
                            </div>
                            <div className="hidden md:block h-5 w-px bg-slate-200" />
                            <nav className="hidden md:flex items-center gap-1 text-[12px] font-semibold text-slate-600">
                                {[["סקירה","בית"],["שווקים","שווקים"],["AI Agent","AI Agent"],["יומן","יומן"],["הגדרות","הגדרות"]].map(([l,s])=>(
                                    <button key={s} onClick={()=>onNavigate && onNavigate(s)} className="rounded px-2.5 py-1 hover:bg-slate-100 hover:text-slate-900 transition">{l}</button>
                                ))}
                            </nav>
                            <div className="flex-1" />
                            <div dir="ltr" className="hidden md:flex items-center gap-1.5 rounded-sm border border-slate-200 bg-slate-50 px-2.5 py-1 text-[11px] text-slate-500">
                                <Icon name="search" className="h-3 w-3" />
                                <input className="w-44 bg-transparent text-[11px] text-slate-700 placeholder:text-slate-400 outline-none" placeholder="Search ticker, signal, report…" />
                                <span className="rounded border border-slate-200 bg-white px-1 text-[9px] font-bold text-slate-400">⌘K</span>
                            </div>
                            <div className="hidden sm:flex items-center gap-2 rounded-sm border border-slate-200 bg-white px-2.5 py-1">
                                <span className={`h-1.5 w-1.5 rounded-full pulse-dot ${marketOpen ? "bg-emerald-500" : "bg-slate-400"}`} />
                                <span className="text-[10px] font-bold uppercase tracking-wider text-slate-600">{marketOpen ? "MARKET OPEN" : "MARKET CLOSED"}</span>
                            </div>
                            <div dir="ltr" className="hidden sm:block inst-mono text-[11px] font-bold tabular-nums text-slate-700">
                                {clock.toLocaleTimeString("en-GB", {hour12:false})} <span className="text-slate-400">UTC{(-clock.getTimezoneOffset()/60>=0?"+":"")+(-clock.getTimezoneOffset()/60)}</span>
                            </div>
                            <button onClick={refreshData} disabled={loading} className="flex items-center gap-1.5 rounded-sm border border-slate-200 bg-white px-2.5 py-1 text-[11px] font-bold text-slate-700 hover:bg-slate-50 disabled:opacity-50">
                                {loading ? "SYNCING…" : refreshed ? "✓ SYNCED" : "↻ SYNC"}
                            </button>
                            <div className="flex items-center gap-1.5 border-r border-slate-200 pr-3">
                                <div className="grid h-6 w-6 place-items-center rounded-full bg-slate-900 text-[10px] font-bold text-white">{(userName||"T").slice(0,1).toUpperCase()}</div>
                                <span className="hidden md:inline text-[11px] font-bold text-slate-700">{userName || "Trader"}</span>
                            </div>
                        </div>
                    </header>

                    {/* ─────────── 2. HERO ─────────── */}
                    <section className="border-b border-slate-200 bg-white">
                        <div className="mx-auto grid max-w-[1400px] gap-6 px-5 py-9 md:grid-cols-[1fr_auto] md:items-end">
                            <div>
                                <div className="mb-3 flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">
                                    <span className="h-1.5 w-1.5 rounded-full bg-emerald-500 pulse-dot" />
                                    <span>INSTITUTIONAL TRADING DESK · {(userName||"TRADER").toUpperCase()}</span>
                                </div>
                                <h1 className="text-[34px] leading-[1.05] font-bold tracking-tight text-slate-900 md:text-[44px]">
                                    Capital-Markets Operating System
                                </h1>
                                <p className="mt-3 max-w-2xl text-[14px] leading-relaxed text-slate-600">
                                    Live market intelligence, systematic signal generation and disciplined risk control — engineered for serious decision-making across FX, equities and indices.
                                </p>
                                <div className="mt-5 flex flex-wrap items-center gap-2">
                                    <button onClick={() => onNavigate && onNavigate("AI Agent")} className="rounded-sm bg-slate-900 px-4 py-2 text-[12px] font-bold text-white hover:bg-slate-800">
                                        OPEN COMMAND CONSOLE →
                                    </button>
                                    <button onClick={() => onNavigate && onNavigate("יומן")} className="rounded-sm border border-slate-300 bg-white px-4 py-2 text-[12px] font-bold text-slate-800 hover:bg-slate-50">
                                        METHODOLOGY & REPORTS
                                    </button>
                                    {!connectedBroker && (
                                        <button onClick={() => onAction && onAction("חבר ברוקר")} className="rounded-sm border border-slate-300 bg-white px-4 py-2 text-[12px] font-bold text-[#0B2A6B] hover:bg-slate-50">
                                            CONNECT EXECUTION BROKER
                                        </button>

        function EmpirexHomeAfterSignup() {
            const TEMP_ALLOW_HOME_WITHOUT_LOGIN = false;
            const [userName, setUserName] = useState(getUserNameFromContext);
            const [lang, setLang] = useState(getLang);
            useEffect(() => {
                applyLangToDocument(lang);
            }, [lang]);
            useEffect(() => {
                function onLang(e) { if (e?.detail?.lang) setLang(e.detail.lang); }
                window.addEventListener("empirex:lang", onLang);
                return () => window.removeEventListener("empirex:lang", onLang);
            }, []);
            const [marketData, setMarketData] = useState({ fx: fallbackFx, stocks: fallbackStocks, source: "fallback" });
            const [lastUpdated, setLastUpdated] = useState(null);
            const [loading, setLoading] = useState(false);
            const [refreshed, setRefreshed] = useState(false);
            const [authChecked, setAuthChecked] = useState(false);
            const [activeSection, setActiveSection] = useState("בית");
            const [searchQuery, setSearchQuery] = useState("");
            const [chartItem, setChartItem] = useState(null);
            const [chartItemType, setChartItemType] = useState(null);
            const [brokerWizardOpen, setBrokerWizardOpen] = useState(false);
            const [connectedBroker, setConnectedBroker] = useState(() => {
                try { return JSON.parse(localStorage.getItem("empirex_broker_connection")); } catch { return null; }
            });
            const [brokerDataLoading, setBrokerDataLoading] = useState(false);
            // Ref to guard against concurrent market data fetches (avoids stale closure issue)
            const marketFetchingRef = React.useRef(false);
            const [botOpenTrades, setBotOpenTrades] = useState([]);
            const [botTradeHistory, setBotTradeHistory] = useState([]);

            async function refreshBrokerData() {
                let savedCreds = null;
                try { savedCreds = JSON.parse(localStorage.getItem("empirex_broker_creds")); } catch {}
                if (!savedCreds || !savedCreds.server || !savedCreds.login || !savedCreds.password) return;
                setBrokerDataLoading(true);
                try {
                    const res = await fetch("/api/broker/trades", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(savedCreds),
                    });
                    if (!res.ok) return;
                    const result = await res.json();
                    if (!result.ok) return;
                    const acct = result.data;
                    setConnectedBroker(prev => {
                        if (!prev) return prev;
                        const updated = {
                            ...prev,
                            balance: acct.balance ?? prev.balance,
                            equity: acct.equity ?? prev.equity,
                            totalTrades: acct.totalTrades ?? prev.totalTrades,
                            openPositions: acct.openPositions ?? prev.openPositions,
                            dailyPnl: acct.dailyPnl ?? prev.dailyPnl,
                            dailyTrades: acct.dailyTrades ?? prev.dailyTrades,
                            dailyWins: acct.dailyWins ?? prev.dailyWins,
                            aiSummary: acct.aiSummary || prev.aiSummary,
                        };
                        try { localStorage.setItem("empirex_broker_connection", JSON.stringify(updated)); } catch {}
                        return updated;
                    });
                } catch {}
                setBrokerDataLoading(false);
            }

            const dateLabel = useMemo(() => {
                if (!lastUpdated) return "ממתין לעדכון";
                return new Intl.DateTimeFormat("he-IL", {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                }).format(lastUpdated);
            }, [lastUpdated]);

            async function refreshData() {
                if (marketFetchingRef.current) return;
                marketFetchingRef.current = true;
                setLoading(true);
                setRefreshed(false);
                const data = await fetchMarketData();
                setMarketData((prev) => {
                    const previousBySymbol = new Map(
                        [...(prev?.fx || []), ...(prev?.stocks || [])].map((item) => [item.symbol, item.history || []])
                    );

                    const attachHistory = (list) =>
                        list.map((item) => {
                            const currentPrice = typeof item.price === "number" ? item.price : Number(item.price);
                            const prevHistory = previousBySymbol.get(item.symbol) || [];
                            const apiHistory = Array.isArray(item.history) ? item.history.filter((v) => typeof v === "number" && !Number.isNaN(v)) : [];
                            const nextHistory = (apiHistory.length ? apiHistory : [...prevHistory, currentPrice])
                                .filter((v) => typeof v === "number" && !Number.isNaN(v))
                                .slice(-60);
                            return { ...item, history: nextHistory };
                        });

                    return {
                        ...data,
                        fx: attachHistory(data.fx || []),
                        stocks: attachHistory(data.stocks || []),
                    };
                });
                setLastUpdated(new Date());
                marketFetchingRef.current = false;
                setLoading(false);
                setRefreshed(true);
                setTimeout(() => setRefreshed(false), 2500);
            }

            const filteredFx = useMemo(() => {
                const query = searchQuery.trim().toLowerCase();
                if (!query) return marketData.fx;
                return (marketData.fx || []).filter((item) => {
                    const symbol = String(item.symbol || "").toLowerCase();
                    const name = String(item.name || "").toLowerCase();
                    return symbol.includes(query) || name.includes(query);
                });
            }, [marketData.fx, searchQuery]);

            const filteredStocks = useMemo(() => {
                const query = searchQuery.trim().toLowerCase();
                if (!query) return marketData.stocks;
                return (marketData.stocks || []).filter((item) => {
                    const symbol = String(item.symbol || "").toLowerCase();
                    const name = String(item.name || "").toLowerCase();
                    return symbol.includes(query) || name.includes(query);
                });
            }, [marketData.stocks, searchQuery]);

            function goToConstructionPage(sectionLabel) {
                const section = encodeURIComponent(sectionLabel || "מודול");
                window.location.assign(`./module-under-construction.html?section=${section}`);
            }

            function handleNavigate(sectionLabel) {
                setActiveSection(sectionLabel);
                const inline = ["בית","יומן","אוטומציה","AI Agent","שווקים","הגדרות"];
                if (inline.includes(sectionLabel)) {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                } else {
                    goToConstructionPage(navMeta[sectionLabel] || sectionLabel);
                }
            }

            function handleAction(sectionLabel) {
                if (sectionLabel === "חבר ברוקר") {
                    setBrokerWizardOpen(true);
                    return;
                }
                goToConstructionPage(sectionLabel);
            }

            function handleDisconnectBroker() {
                setConnectedBroker(null);
                try { localStorage.removeItem("empirex_broker_connection"); } catch {}
                try { localStorage.removeItem("empirex_broker_creds"); } catch {}
            }

            function handleOpenChart(item, type) {
                setChartItem(item);
                setChartItemType(type);
            }

            useEffect(() => {
                // Decode HMAC-signed token payload locally (without verifying signature)
                // so the user is never bounced to login when the server has a temporary
                // hiccup. The server still validates on every API call that needs auth.
                function decodeLocalToken(tok) {
                    try {
                        if (!tok || typeof tok !== "string") return null;
                        const parts = tok.split(".");
                        if (parts.length !== 2) return null;
                        let b = parts[0].replace(/-/g, "+").replace(/_/g, "/");
                        const pad = b.length % 4; if (pad) b += "=".repeat(4 - pad);
                        const json = decodeURIComponent(escape(atob(b)));
                        const payload = JSON.parse(json);
                        if (!payload || typeof payload !== "object") return null;
                        if (payload.exp && payload.exp * 1000 < Date.now()) return null;
                        return payload;
                    } catch { return null; }
                }

                const validateSession = async () => {
                    if (TEMP_ALLOW_HOME_WITHOUT_LOGIN) {
                        setAuthChecked(true);
                        return;
                    }

                    if (window.location.protocol === "file:") {
                        setAuthChecked(true);
                        return;
                    }

                    const sessionToken = localStorage.getItem("empirex_session_token");
                    if (!sessionToken) {
                        window.location.replace("/?reason=auth-required");
                        return;
                    }

                    // Fast-path: trust well-formed, unexpired token locally — never bounce
                    // the user out due to a slow/cold-started backend.
                    const localPayload = decodeLocalToken(sessionToken);
                    if (localPayload) {
                        if (localPayload.name) setUserName(localPayload.name);
                        else setUserName(getUserNameFromContext());
                        setAuthChecked(true);
                    }

                    // Background validation: only kick out on a *definite* 401 from the
                    // server. Network errors, 5xx, or timeouts → keep the user logged in.
                    try {
                        const response = await fetch(`/api/session/validate?token=${encodeURIComponent(sessionToken)}`);
                        if (response.status === 401) {
                            localStorage.removeItem("empirex_session_token");
                            window.location.replace("/?reason=session-expired");
                            return;
                        }
                        if (response.ok) {
                            const result = await response.json();
                            if (result && result.ok && result.data) {
                                if (result.data.fullName) setUserName(result.data.fullName);
                                if (!localPayload) setAuthChecked(true);
                            }
                        } else if (!localPayload) {
                            // Server unreachable AND no local payload → kick to login
                            localStorage.removeItem("empirex_session_token");
                            window.location.replace("/?reason=session-expired");
                        }
                    } catch (error) {
                        // Network failure — if we have local payload, stay logged in.
                        if (!localPayload) {
                            localStorage.removeItem("empirex_session_token");
                            window.location.replace("/?reason=session-expired");
                        }
                    }
                };

                validateSession();
            }, []);

            useEffect(() => {
                if (!authChecked) return;
                // Initial load via regular fetch
                refreshData();
                // SSE real-time stream — replaces polling
                let es;
                try {
                    es = new EventSource("/api/market/stream");
                    es.onmessage = (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            if (data.type === "market") {
                                setMarketData(prev => {
                                    const prevBySymbol = new Map(
                                        [...(prev?.fx || []), ...(prev?.stocks || [])].map(item => [item.symbol, item.history || []])
                                    );
                                    const attachHistory = (list) => list.map((item) => {
                                        const cp = typeof item.price === "number" ? item.price : Number(item.price);
                                        const ph = prevBySymbol.get(item.symbol) || [];
                                        const ah = Array.isArray(item.history) ? item.history.filter(v => typeof v === "number" && !isNaN(v)) : [];
                                        const nh = (ah.length ? ah : [...ph, cp]).filter(v => typeof v === "number" && !isNaN(v)).slice(-60);
                                        return { ...item, history: nh };
                                    });
                                    return { ...data, fx: attachHistory(data.fx || []), stocks: attachHistory(data.stocks || []) };
                                });
                                setLastUpdated(new Date());
                                marketFetchingRef.current = false;
                                setLoading(false);
                            }
                            if (data.type === "bot_positions") {
                                setBotOpenTrades(data.positions || []);
                            }
                            if (data.type === "bot_trade_opened") {
                                setBotOpenTrades(prev => [...prev, data]);
                            }
                            if (data.type === "bot_trade_closed") {
                                setBotOpenTrades(prev => prev.filter(t => t.ticket !== data.ticket));
                                // Refresh history
                                fetch("/api/bot/trades?limit=50").then(r => r.json()).then(d => { if (d.ok) setBotTradeHistory(d.data || []); }).catch(() => {});
                            }
                        } catch {}
                    };
                    es.onerror = () => {
                        // SSE failed, fall back to interval
                        const id = setInterval(refreshData, 5000);
                        return () => clearInterval(id);
                    };
                } catch {
                    // No SSE support — fallback
                    const id = setInterval(refreshData, 5000);
                    return () => clearInterval(id);
                }
                return () => { try { es.close(); } catch {} };
            }, [authChecked]);

            // Poll MT5 broker data every 30 seconds when connected
            useEffect(() => {
                if (!connectedBroker) return;
                const isMT = connectedBroker.platformId === "mt4" || connectedBroker.platformId === "mt5";
                if (!isMT) return;
                const id = setInterval(refreshBrokerData, 30000);
                return () => clearInterval(id);
            }, [connectedBroker?.brokerId]);

            if (!authChecked) {
                return (
                    <div className="min-h-screen grid place-items-center bg-[#F7FAFF] text-[#07124A]">
                        <p className="text-lg font-black">מאמת הרשאה...</p>
                    </div>
                );
            }

            const DARK_BG = "radial-gradient(circle at 20% 30%, rgba(59,130,246,.22), transparent 32%), radial-gradient(circle at 82% 18%, rgba(34,211,238,.15), transparent 28%), radial-gradient(circle at 50% 100%, rgba(124,58,237,.20), transparent 36%), linear-gradient(180deg, #050a24 0%, #06113a 50%, #020617 100%)";
            const PAGE_BG = {
                "יומן":      DARK_BG,
                "אוטומציה":  "linear-gradient(160deg,#E0F2FE 0%,#BAE6FD 40%,#7DD3FC 100%)",
                "AI Agent":  DARK_BG,
                "שווקים":    "linear-gradient(160deg,#FFF7ED 0%,#FFEDD5 40%,#FED7AA 100%)",
                "הגדרות":   "linear-gradient(160deg,#F5F3FF 0%,#EDE9FE 40%,#DDD6FE 100%)",
            };
            const pageBg = PAGE_BG[activeSection];
            const isDarkPage = activeSection === "AI Agent" || activeSection === "יומן";
            return (
                <div dir="rtl" className={`min-h-screen ${isDarkPage ? "text-white" : "text-[#07124A]"} selection:bg-cyan-200/60 relative`} style={pageBg ? { background: pageBg } : { background:"#F7FAFF" }}>
                    {/* Grid overlay for dark pages (Journal + Agent) — matches the design spec */}
                    {isDarkPage && (
                        <div className="pointer-events-none fixed inset-0 z-0"
                             style={{
                                 backgroundImage: "linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px)",
                                 backgroundSize: "64px 64px",
                             }} />
                    )}
                    {!pageBg && <div className="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_12%_10%,rgba(24,139,255,.12),transparent_28%),radial-gradient(circle_at_88%_12%,rgba(19,201,199,.12),transparent_28%),linear-gradient(135deg,#FFFFFF_0%,#F7FAFF_48%,#EEF5FF_100%)]" />}
                    <Header
                        userName={userName}
                        active={activeSection}
                        onNavigate={handleNavigate}
                        searchQuery={searchQuery}
                        onSearchChange={setSearchQuery}
                        onSearchSubmit={() => {
                            const section = document.getElementById("market-sections");
                            if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
                        }}
                        onOpenPlaceholder={handleAction}
                        lang={lang}
                    />

                    <main className="px-5 pb-10 relative z-10">
                        {activeSection === "יומן" ? (
                            <JournalSection
                                connectedBroker={connectedBroker || { brokerLabel:"ללא ברוקר", platformLabel:"—", currency:"USD" }}
                                isRefreshing={brokerDataLoading}
                                onRefresh={refreshBrokerData}
                                onConnectBroker={() => setBrokerWizardOpen(true)}
                                onDisconnect={handleDisconnectBroker}
                                botTrades={botTradeHistory}
                            />
                        ) : activeSection === "אוטומציה" ? (
                            <BotSection
                                connectedBroker={connectedBroker || { brokerLabel:"ללא ברוקר", platformLabel:"—", platformId:"", currency:"USD" }}
                                onConnectBroker={() => setBrokerWizardOpen(true)}
                                openTrades={botOpenTrades}
                                setOpenTrades={setBotOpenTrades}
                                tradeHistory={botTradeHistory}
                                setTradeHistory={setBotTradeHistory}
                            />
                        ) : activeSection === "AI Agent" ? (
                            <AgentSection
                                connectedBroker={connectedBroker || { brokerLabel:"ללא ברוקר", platformLabel:"—" }}
                                onConnectBroker={() => setBrokerWizardOpen(true)}
                            />
                        ) : activeSection === "שווקים" ? (
                            <MarketsSection marketData={marketData} />
                        ) : activeSection === "הגדרות" ? (
                            <SettingsSection userName={userName} setUserName={setUserName} />
                        ) : (
                            <InstitutionalHome
                                userName={userName}
                                onAction={handleAction}
                                connectedBroker={connectedBroker}
                                onDisconnect={handleDisconnectBroker}
                                lang={lang}
                                marketData={marketData}
                                dateLabel={dateLabel}
                                loading={loading}
                                refreshed={refreshed}
                                refreshData={refreshData}
                                filteredFx={filteredFx}
                                filteredStocks={filteredStocks}
                                handleOpenChart={handleOpenChart}
                                onNavigate={handleNavigate}
                            />
                        )}
                    </main>
                    {chartItem && (
                        <ChartModal
                            item={chartItem}
                            type={chartItemType}
                            onClose={() => { setChartItem(null); setChartItemType(null); }}
                        />
                    )}
                    {brokerWizardOpen && (
                        <BrokerWizardModal
                            onClose={() => setBrokerWizardOpen(false)}
                            onConnected={(conn) => { setConnectedBroker(conn); setBrokerWizardOpen(false); }}
                        />
                    )}
                    <SupportWidget lang={lang} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<EmpirexHomeAfterSignup />);
    </script>
</body>

</html>
