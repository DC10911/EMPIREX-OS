// ============================================================
// UTILITY FUNCTIONS
// ============================================================

function fmt$(n, digits=2){ return (n>=0?"+$":"−$")+Math.abs(n).toFixed(digits).replace(/\B(?=(\d{3})+(?!\d))/g,","); }
function fmtPct(n){ return (n>=0?"+":"")+n.toFixed(1)+"%"; }
function relTime(iso){
  const d=new Date(iso), now=Date.now(), diff=now-d.getTime();
  if(diff<60000) return "כרגע";
  if(diff<3600000) return `לפני ${Math.floor(diff/60000)} דק'`;
  if(diff<86400000) return `לפני ${Math.floor(diff/3600000)} שע'`;
  return d.toLocaleDateString("he-IL");
}
function severityColor(s){
  return { critical:"text-red-400", high:"text-orange-400", warning:"text-amber-400", info:"text-blue-400" }[s]||"text-slate-400";
}
function severityBg(s){
  return { critical:"bg-red-500/15 border-red-500/30", high:"bg-orange-500/12 border-orange-500/25", warning:"bg-amber-500/12 border-amber-500/25", info:"bg-blue-500/10 border-blue-500/20" }[s]||"bg-slate-500/10 border-slate-500/20";
}
function severityLabel(s){
  return { critical:"קריטי", high:"גבוה", warning:"אזהרה", info:"מידע" }[s]||s;
}
function statusBg(s){
  return { open:"bg-red-500/15 text-red-400", acknowledged:"bg-amber-500/12 text-amber-400", resolved:"bg-emerald-500/12 text-emerald-400" }[s]||"bg-slate-500/10 text-slate-400";
}
function statusLabel(s){
  return { open:"פתוח", acknowledged:"אושר", resolved:"נסגר", in_progress:"בטיפול", completed:"הושלם", suggested:"מוצע", pending_approval:"ממתין לאישור", approved:"אושר", executed:"בוצע", rejected:"נדחה" }[s]||s;
}
function actionTypeLabel(t){
  return { PAUSE_BOT:"עצירת בוט", RESUME_BOT:"הפעלת בוט", BLOCK_SYMBOL:"חסימת נכס", REDUCE_RISK_MODE:"הורדת סיכון", CREATE_JOURNAL_NOTE:"הערת יומן", SEND_NOTIFICATION:"שלח התראה", CREATE_INVESTIGATION:"פתח חקירה", REQUIRE_USER_CONFIRMATION:"אשר ידנית" }[t]||t;
}
function catLabel(c){ return { risk:"סיכון", compliance:"עמידה בכללים", bot:"בוט", broker:"ברוקר", strategy:"אסטרטגיה", news:"חדשות", journal:"יומן" }[c]||c; }
function eventIcon(t){
  return { TRADE_OPENED:"📈", TRADE_CLOSED:"📉", BOT_STARTED:"🤖", BOT_PAUSED:"⏸", BOT_STOPPED:"🛑", RISK_LIMIT_APPROACHING:"⚠️", RISK_LIMIT_REACHED:"🚨", LOSS_STREAK_DETECTED:"🔴", OVERTRADING_DETECTED:"⚡", NEWS_EVENT_APPROACHING:"📰", REPORT_TIME_REACHED:"📋", BROKER_DISCONNECTED:"🔌" }[t]||"•";
}

function Badge({ severity, label }){
  const bg = { critical:"bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]", high:"bg-orange-500", warning:"bg-amber-500", info:"bg-blue-500" }[severity]||"bg-slate-500";
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-black text-white ${bg}`}>{label||severityLabel(severity)}</span>;
}

function StatusChip({ status }){
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold border ${statusBg(status)}`}>{statusLabel(status)}</span>;
}

function Card({ children, className="", onClick }){
  return <div onClick={onClick} className={`bg-[#0B1F3A] border border-[rgba(148,163,184,0.13)] rounded-2xl ${className} ${onClick?"cursor-pointer hover:border-blue-500/30 transition-colors":""}`}>{children}</div>;
}

function MetricCard({ icon, label, value, sub, accent="blue", delta }){
  const ac = { blue:"text-blue-400 border-blue-500/20 bg-blue-500/8", emerald:"text-emerald-400 border-emerald-500/20 bg-emerald-500/8", red:"text-red-400 border-red-500/20 bg-red-500/8", amber:"text-amber-400 border-amber-500/20 bg-amber-500/8", purple:"text-purple-400 border-purple-500/20 bg-purple-500/8", cyan:"text-cyan-400 border-cyan-500/20 bg-cyan-500/8" }[accent]||"text-slate-400 border-slate-500/20 bg-slate-500/8";
  return (
    <Card className={`p-4 border ${ac}`}>
      <div className="flex items-center justify-between mb-2">
        <span className="text-lg">{icon}</span>
        {delta!==undefined && <span className={`text-[11px] font-bold ${delta>=0?"text-emerald-400":"text-red-400"}`}>{delta>=0?"+":""}{delta}%</span>}
      </div>
      <div className={`text-xl font-black ${ac.split(" ")[0]}`}>{value}</div>
      <div className="text-[12px] text-slate-400 mt-0.5">{label}</div>
      {sub && <div className="text-[11px] text-slate-500 mt-0.5">{sub}</div>}
    </Card>
  );
}

function RiskBar({ label, value, max, severity, unit="$" }){
  const pct = Math.min(100, (value/max)*100);
  const col = { critical:"bg-red-500", high:"bg-orange-500", warning:"bg-amber-500", info:"bg-blue-500" }[severity]||"bg-blue-500";
  return (
    <div>
      <div className="flex justify-between text-[12px] mb-1">
        <span className="text-slate-300">{label}</span>
        <span className={`font-bold ${severityColor(severity)}`}>{unit}{value.toFixed(0)} / {unit}{max}</span>
      </div>
      <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
        <div className={`h-full rounded-full transition-all ${col}`} style={{width:`${pct}%`}}/>
      </div>
      <div className="text-right text-[10px] text-slate-500 mt-0.5">{pct.toFixed(0)}%</div>
    </div>
  );
}

function Toggle({ checked, onChange }){
  return (
    <label className="toggle">
      <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)} />
      <span className="slider"/>
    </label>
  );
}

function SectionTitle({ children, sub }){
  return (
    <div className="mb-4">
      <h2 className="text-lg font-black text-white">{children}</h2>
      {sub && <p className="text-[12px] text-slate-400 mt-0.5">{sub}</p>}
    </div>
  );
}

function AlertsPage(){
  const [filter, setFilter] = useState("all");
  const [catFilter, setCatFilter] = useState("all");
  const [alerts, setAlerts] = useState(mockAlerts);

  const filtered = alerts.filter(a=>{
    const sf = filter==="all"||a.severity===filter||(filter==="unresolved"&&a.status!=="resolved")||(filter==="action"&&a.actionRequired);
    const cf = catFilter==="all"||a.category===catFilter;
    return sf&&cf;
  });

  const counts = { critical:alerts.filter(a=>a.severity==="critical").length, high:alerts.filter(a=>a.severity==="high").length, open:alerts.filter(a=>a.status==="open").length, resolved:alerts.filter(a=>a.status==="resolved").length };

  function ack(id){ setAlerts(prev=>prev.map(a=>a.id===id?{...a,status:"acknowledged"}:a)); }
  function resolve(id){ setAlerts(prev=>prev.map(a=>a.id===id?{...a,status:"resolved",resolvedAt:new Date().toISOString()}:a)); }

  return (
    <div className="p-6 slide-in">
      <SectionTitle sub="מרכז ניהול חריגות וסיכונים">חריגות פתוחות</SectionTitle>
      <div className="grid grid-cols-4 gap-4 mb-6">
        <MetricCard icon="🚨" label="קריטי" value={counts.critical} accent="red"/>
        <MetricCard icon="⚠️" label="גבוה" value={counts.high} accent="amber"/>
        <MetricCard icon="🔔" label="פתוחות" value={counts.open} accent="blue"/>
        <MetricCard icon="✅" label="נסגרו היום" value={counts.resolved} accent="emerald"/>
      </div>

      <div className="flex items-center gap-3 mb-4 flex-wrap">
        <div className="flex bg-slate-800/60 rounded-xl p-1 gap-1">
          {[["all","הכל"],["critical","קריטי"],["high","גבוה"],["warning","אזהרה"],["info","מידע"],["unresolved","לא נסגרו"],["action","נדרשת פעולה"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} className={`px-3 py-1.5 rounded-lg text-[12px] font-semibold transition-colors ${filter===v?"bg-blue-600 text-white":"text-slate-400 hover:text-white"}`}>{l}</button>
          ))}
        </div>
        <div className="flex bg-slate-800/60 rounded-xl p-1 gap-1">
          {[["all","כל קטגוריות"],["risk","סיכון"],["compliance","עמידה"],["bot","בוט"],["broker","ברוקר"],["strategy","אסטרטגיה"],["news","חדשות"]].map(([v,l])=>(
            <button key={v} onClick={()=>setCatFilter(v)} className={`px-3 py-1.5 rounded-lg text-[12px] font-semibold transition-colors ${catFilter===v?"bg-purple-600 text-white":"text-slate-400 hover:text-white"}`}>{l}</button>
          ))}
        </div>
      </div>

      <div className="space-y-3">
        {filtered.map(a=>(
          <Card key={a.id} className={`p-4 border ${severityBg(a.severity)}`}>
            <div className="flex items-start gap-4">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                  <Badge severity={a.severity}/>
                  <span className="text-[11px] text-slate-400 bg-slate-800/60 rounded px-2 py-0.5">{catLabel(a.category)}</span>
                  <StatusChip status={a.status}/>
                  {a.actionRequired && <span className="text-[11px] text-amber-400 bg-amber-500/10 border border-amber-500/20 rounded px-2 py-0.5">נדרשת פעולה</span>}
                </div>
                <h3 className="text-[14px] font-black text-white mb-1">{a.title}</h3>
                <p className="text-[12px] text-slate-300 leading-5">{a.message}</p>
                {a.suggestedAction && <div className="mt-2 text-[11px] text-blue-400">פעולה מוצעת: {actionTypeLabel(a.suggestedAction)}</div>}
              </div>
              <div className="flex flex-col items-end gap-2 shrink-0">
                <div className="text-[11px] text-slate-500">{relTime(a.createdAt)}</div>
                {a.status!=="resolved" && (
                  <div className="flex gap-1.5 mt-2">
                    {a.status==="open" && <button onClick={()=>ack(a.id)} className="bg-amber-600/20 hover:bg-amber-600/30 border border-amber-500/30 text-amber-400 text-[11px] font-bold rounded-lg px-3 py-1.5 transition-colors">אשר קבלה</button>}
                    <button onClick={()=>resolve(a.id)} className="bg-emerald-600/20 hover:bg-emerald-600/30 border border-emerald-500/30 text-emerald-400 text-[11px] font-bold rounded-lg px-3 py-1.5 transition-colors">סגור</button>
                  </div>
                )}
              </div>
            </div>
          </Card>
        ))}
        {filtered.length===0 && <div className="text-center py-16 text-slate-500 text-sm">אין חריגות התואמות את הסינון</div>}
      </div>
    </div>
  );
}

              </div>
              <h1 className="text-xl font-black text-white">{selected.title}</h1>
              <div className="text-[12px] text-slate-400 mt-1">{new Date(selected.periodStart).toLocaleDateString("he-IL")} — {new Date(selected.periodEnd).toLocaleDateString("he-IL")}</div>
            </div>
            <div className="flex gap-2">
              <button className="border border-slate-600 text-slate-300 rounded-xl px-4 py-2 text-[12px] font-bold hover:bg-slate-700 transition-colors">ייצא PDF</button>
              <button className="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-4 py-2 text-[12px] font-bold transition-colors">שלח דוח</button>
            </div>
          </div>

          {/* Summary */}
          <Card className="p-5">
            <div className="text-[13px] font-black text-white mb-2">סיכום</div>
            <p className="text-[13px] text-slate-300 leading-6">{selected.summary}</p>
          </Card>

          {/* Metrics */}
          <div className="grid grid-cols-6 gap-4">
            {[
              ["P&L", fmt$(selected.metrics.pnl), selected.metrics.pnl>=0?"emerald":"red"],
              ["עסקאות", selected.metrics.trades, "blue"],
              ["Win Rate", `${selected.metrics.winRate}%`, "cyan"],
              ["Avg R", `${selected.metrics.averageR}R`, "purple"],
              ["Drawdown", `${selected.metrics.drawdown}%`, selected.metrics.drawdown>7?"red":selected.metrics.drawdown>4?"amber":"emerald"],
              ["סיכון שנוצל", `${selected.metrics.riskUsed}%`, selected.metrics.riskUsed>80?"red":selected.metrics.riskUsed>60?"amber":"blue"],
            ].map(([l,v,a])=>(
              <MetricCard key={l} label={l} value={v} accent={a}/>
            ))}
          </div>

          <div className="grid grid-cols-3 gap-5">
            {/* Insights */}
            <Card className="p-5">
              <div className="text-[13px] font-black text-white mb-3 flex items-center gap-2"><span>💡</span>תובנות</div>
              <div className="space-y-2">
                {selected.insights.map((ins,i)=>(
                  <div key={i} className="flex items-start gap-2 text-[12px] text-slate-300">
                    <span className="text-blue-400 mt-0.5">›</span>{ins}
                  </div>
                ))}
              </div>
            </Card>

            {/* Anomalies */}
            <Card className="p-5">
              <div className="text-[13px] font-black text-white mb-3 flex items-center gap-2"><span>⚠️</span>חריגות</div>
              <div className="space-y-2">
                {selected.anomalies.length>0 ? selected.anomalies.map((an,i)=>(
                  <div key={i} className="flex items-start gap-2 text-[12px] text-amber-300 bg-amber-500/10 rounded-lg px-3 py-2">
                    <span>⚠</span>{an}
                  </div>
                )) : <div className="text-[12px] text-slate-500">לא זוהו חריגות</div>}
              </div>
            </Card>

            {/* Recommendations */}
            <Card className="p-5">
              <div className="text-[13px] font-black text-white mb-3 flex items-center gap-2"><span>🎯</span>המלצות</div>
              <div className="space-y-2">
                {selected.recommendedActions.map((r,i)=>(
                  <div key={i} className="flex items-start gap-2 text-[12px] text-slate-300">
                    <span className="text-emerald-400 font-black">{i+1}.</span>{r}
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// ACTIONS PAGE
// ============================================================

function ActionsPage(){
  const [actions, setActions] = useState(mockActions);
  const [tab, setTab] = useState("pending");

  function approve(id){ setActions(prev=>prev.map(a=>a.id===id?{...a,status:"executed",executedAt:new Date().toISOString()}:a)); }
  function reject(id){ setActions(prev=>prev.map(a=>a.id===id?{...a,status:"rejected"}:a)); }

  const pending = actions.filter(a=>["pending_approval","suggested"].includes(a.status));
  const executed = actions.filter(a=>a.status==="executed");
  const rejected = actions.filter(a=>a.status==="rejected");
  const list = tab==="pending"?pending:tab==="executed"?executed:rejected;

  return (
    <div className="p-6 slide-in">
      <SectionTitle sub="ניהול פעולות מוצעות, ממתינות ומבוצעות">מרכז פעולות</SectionTitle>

      {/* Policy card */}
      <Card className="p-4 mb-6 border-blue-500/20 bg-blue-500/5">
        <div className="flex items-start gap-3">
          <span className="text-blue-400 text-lg mt-0.5">🛡</span>
          <div>
            <div className="text-[13px] font-black text-white mb-1">מדיניות פעולות סוכן</div>
            <p className="text-[12px] text-slate-400">כל פעולה שמגדילה סיכון דורשת אישור ידני. פעולות שמקטינות סיכון יכולות להתבצע אוטומטית רק אם הוגדר כלל מראש. עצירת בוט אוטומטית מותרת רק לאירועי סיכון קריטי. חידוש בוט דורש אישור תמיד.</p>
          </div>
        </div>
      </Card>

      <div className="flex items-center gap-2 mb-5">
        {[["pending",`ממתינות (${pending.length})`],["executed",`בוצעו (${executed.length})`],["rejected",`נדחו (${rejected.length})`]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} className={`px-4 py-2 rounded-xl text-[13px] font-bold transition-colors ${tab===v?"bg-blue-600 text-white":"bg-slate-800/60 text-slate-400 hover:text-white"}`}>{l}</button>
        ))}
      </div>

      <div className="space-y-3">
        {list.map(a=>(
          <Card key={a.id} className={`p-5 border ${a.reducesRisk&&!a.increasesRisk?"border-blue-500/20":a.increasesRisk?"border-red-500/25":a.status==="rejected"?"border-slate-600/30":"border-slate-700/30"}`}>
            <div className="flex items-start gap-5">
              <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg shrink-0 ${a.reducesRisk?"bg-blue-500/15":"a.increasesRisk"?"bg-red-500/15":"bg-slate-700/40"}`}>
                {{"PAUSE_BOT":"⏸","RESUME_BOT":"▶️","BLOCK_SYMBOL":"🚫","REDUCE_RISK_MODE":"📉","CREATE_JOURNAL_NOTE":"📝","SEND_NOTIFICATION":"🔔","CREATE_INVESTIGATION":"🔍","REQUIRE_USER_CONFIRMATION":"🔐"}[a.actionType]||"⚡"}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1 flex-wrap">
                  <span className="text-[11px] text-slate-400 bg-slate-800/60 rounded px-2 py-0.5">{actionTypeLabel(a.actionType)}</span>
                  <Badge severity={a.severity}/>
                  <StatusChip status={a.status}/>
                  {a.reducesRisk&&<span className="text-[10px] text-blue-400 bg-blue-500/10 border border-blue-500/20 rounded px-2 py-0.5">מקטין סיכון</span>}
                  {a.increasesRisk&&<span className="text-[10px] text-red-400 bg-red-500/10 border border-red-500/20 rounded px-2 py-0.5">מגדיל סיכון — נדרש אישור</span>}
                </div>
                <h3 className="text-[14px] font-black text-white mb-1">{a.title}</h3>
                <p className="text-[12px] text-slate-400">{a.description}</p>
                {a.executedAt&&<div className="text-[11px] text-slate-500 mt-1">בוצע: {relTime(a.executedAt)}</div>}
              </div>
              <div className="flex flex-col items-end gap-2 shrink-0">
                <div className="text-[11px] text-slate-500">{relTime(a.createdAt)}</div>
                {["pending_approval","suggested"].includes(a.status)&&(
                  <div className="flex gap-2 mt-1">
                    <button onClick={()=>approve(a.id)} className="bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold rounded-lg px-4 py-2 transition-colors">אשר ובצע</button>
                    <button onClick={()=>reject(a.id)} className="bg-slate-700 hover:bg-slate-600 text-slate-300 text-[11px] font-bold rounded-lg px-4 py-2 transition-colors">דחה</button>
                  </div>
                )}
              </div>
            </div>
          </Card>
        ))}
        {list.length===0&&<div className="text-center py-16 text-slate-500 text-sm">אין פעולות להצגה</div>}
      </div>
    </div>
  );
}

// ============================================================
// SETTINGS PAGE
// ============================================================

function SettingsPage(){
  const [s, setS] = useState(mockSettings);
  const set = (k,v)=>setS(prev=>({...prev,[k]:v}));

  function Section({ title, children }){
    return (
      <Card className="p-6 mb-4">
        <div className="text-[14px] font-black text-white mb-4 border-b border-slate-700/50 pb-3">{title}</div>
        {children}
      </Card>
    );
  }
  function Row({ label, sub, children }){
    return (
      <div className="flex items-center justify-between py-3 border-b border-slate-800/50 last:border-0">
        <div>
          <div className="text-[13px] text-slate-200">{label}</div>
          {sub&&<div className="text-[11px] text-slate-500 mt-0.5">{sub}</div>}
        </div>
        {children}
      </div>
    );
  }

  return (
    <div className="p-6 slide-in max-w-3xl">
      <SectionTitle sub="הגדרות סוכן הבקרה וניהול הרשאות">הגדרות סוכן</SectionTitle>

      <Section title="📅 הגדרות דוח יומי">
        <Row label="הפעל דוח יומי אוטומטי"><Toggle checked={s.briefingEnabled} onChange={v=>set("briefingEnabled",v)}/></Row>
        <Row label="שעת דוח יומי" sub="הדוח ייוצר בשעה זו בכל בוקר">
          <input type="time" value={s.briefingTime} onChange={e=>set("briefingTime",e.target.value)} className="w-28 text-center"/>
        </Row>
        <Row label="הצג בלוח הבקרה"><Toggle checked={s.briefingOnDashboard} onChange={v=>set("briefingOnDashboard",v)}/></Row>
        <Row label="שלח Push Notification"><Toggle checked={s.briefingPush} onChange={v=>set("briefingPush",v)}/></Row>
        <Row label="כלול ביצועי בוט בדוח"><Toggle checked={s.briefingIncludeBot} onChange={v=>set("briefingIncludeBot",v)}/></Row>
        <Row label="כלול המלצת סיכון"><Toggle checked={s.briefingIncludeRisk} onChange={v=>set("briefingIncludeRisk",v)}/></Row>
      </Section>

      <Section title="⚠️ סף התראות">
        {[
          ["אזהרה — הפסד יומי (%)", "dailyLossWarning", 0, 100],
          ["גבוה — הפסד יומי (%)", "dailyLossHigh", 0, 100],
          ["קריטי — הפסד יומי (%)", "dailyLossCritical", 0, 100],
          ["אזהרה — Drawdown (%)", "drawdownWarning", 0, 100],
          ["סיכון פתוח מקסימלי (%)", "openRiskMax", 0, 10],
          ["ספגת מסחר יתר (עסקאות לסשן)", "overtradingThreshold", 1, 20],
          ["ספגת רצף הפסדים", "lossStreakThreshold", 1, 10],
        ].map(([label, key, min, max])=>(
          <Row key={key} label={label}>
            <div className="flex items-center gap-3">
              <input type="range" min={min} max={max} value={s[key]} onChange={e=>set(key,+e.target.value)} className="w-24 accent-blue-500"/>
              <span className="text-[13px] font-black text-blue-400 w-8 text-center">{s[key]}</span>
            </div>
          </Row>
        ))}
      </Section>

      <Section title="🔐 הרשאות סוכן">
        {[
          ["יצירת התראות אוטומטית","canAutoAlerts",""],
          ["יצירת הערות יומן אוטומטית","canAutoJournal",""],
          ["פתיחת חקירות אוטומטית","canAutoInvestigation",""],
          ["עצירת בוט בסיכון קריטי","canPauseBotCritical","רק לאירועים קריטיים"],
          ["חסימת נכסים בסיכון קריטי","canBlockSymbolCritical",""],
          ["חידוש בוט — אישור ידני בלבד","canResumeOnlyApproval","לא ניתן לשנות"],
          ["שינוי אסטרטגיה — אישור ידני","canChangeStrategyApproval",""],
          ["הגדלת סיכון — אף פעם אוטומטי","canIncreaseRiskNever","מדיניות קבועה"],
        ].map(([label, key, sub])=>(
          <Row key={key} label={label} sub={sub||undefined}>
            <Toggle checked={s[key]} onChange={v=>set(key,v)}/>
          </Row>
        ))}
      </Section>

      <Section title="🔔 ערוצי התראות">
        {[
          ["בתוך האפליקציה","notifyInApp",true,false],
          ["אימייל","notifyEmail",false,true],
          ["Push Notification","notifyPush",false,true],
          ["WhatsApp / Telegram","notifyTelegram",false,true],
        ].map(([label, key, enabled, comingSoon])=>(
          <Row key={key} label={label} sub={comingSoon?"בקרוב":undefined}>
            {comingSoon
              ? <span className="text-[11px] text-slate-500 bg-slate-800 rounded px-2 py-1">בקרוב</span>
              : <Toggle checked={s[key]} onChange={v=>set(key,v)}/>}
          </Row>
        ))}
      </Section>

      <Section title="🤖 מדיניות בטיחות בוט">
        {[
          ["עצור בוט בהפסד יומי קריטי","pauseBotCriticalLoss",""],
          ["חסום עסקאות חדשות קרוב למגבלת הפסד","blockTradesNearMax",""],
          ["הפחת סיכון לאחר רצף הפסדים","reduceRiskAfterStreak",""],
          ["חסום נכס לאחר הפסדים חוזרים","blockSymbolAfterLosses",""],
          ["בטל אסטרטגיה לאחר ביצועים חלשים","disableStrategyUnderperform","דורש אישור ידני"],
        ].map(([label, key, sub])=>(
          <Row key={key} label={label} sub={sub||undefined}>
            <Toggle checked={s[key]} onChange={v=>set(key,v)}/>
          </Row>
        ))}
      </Section>

      <div className="flex gap-3">
        <button className="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-6 py-2.5 text-[13px] font-black transition-colors">שמור הגדרות</button>
        <button className="bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl px-6 py-2.5 text-[13px] font-bold transition-colors">אפס ברירות מחדל</button>
      </div>
    </div>
  );
}

// ============================================================
// APP ROOT
// ============================================================

function App(){
  const [route, setRoute] = useState("dashboard");
  const pageMap = {
    dashboard: <DashboardPage setRoute={setRoute}/>,
    alerts: <AlertsPage/>,
    investigations: <InvestigationsPage/>,
    reports: <ReportsPage/>,
    actions: <ActionsPage/>,
    settings: <SettingsPage/>,
  };
  return (
    <div style={{minHeight:"100vh", background:"linear-gradient(160deg, #06111F 0%, #081A33 60%, #06111F 100%)"}}>
      <AgentHeader route={route} setRoute={setRoute}/>
      <main>{pageMap[route]||pageMap.dashboard}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
